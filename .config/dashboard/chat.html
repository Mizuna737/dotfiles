<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Chat</title>
   <link rel="manifest" href="/manifest.json">
   <meta name="apple-mobile-web-app-capable" content="yes">
   <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
   <meta name="apple-mobile-web-app-title" content="Chat">
   <link rel="apple-touch-icon" href="/chat-icon-192.png">
   <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0d0d;
      --bg2: #1a1a1a;
      --bg3: #222;
      --fg: #e0e0e0;
      --fgDim: #888;
      --border: #333;
      --accent: #7ecf8e;
      --accent2: #cfb97e;
      --accent3: #7eaecf;
      --danger: #cf7e7e;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'IBM Plex Mono', monospace;
      background: var(--bg);
      color: var(--fg);
      height: 100dvh;
      height: -webkit-fill-available;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      -webkit-text-size-adjust: 100%;
    }

    /* ── top bar ── */
    #topBar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--bg2);
      flex-shrink: 0;
      position: relative;
    }
    #topBar h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.4rem;
      letter-spacing: 0.05em;
      color: var(--fg);
    }
    #backBtn {
      background: none;
      border: none;
      color: var(--fgDim);
      font-size: 1.2rem;
      cursor: pointer;
      padding: 2px 6px;
      display: none;
    }
    #sessionBadge {
      font-size: 0.65rem;
      padding: 2px 7px;
      border-radius: 3px;
      font-weight: 500;
      display: none;
    }
    #sessionBadge.qwen  { background: var(--accent2); color: #000; }
    #sessionBadge.claude { background: var(--accent3); color: #000; }
    #topTitle { flex: 1; font-size: 0.8rem; color: var(--fgDim); overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }

    /* ── user button ── */
    #userBtn {
      display: none;
      background: none;
      border: none;
      color: var(--fgDim);
      font-size: 1.2rem;
      cursor: pointer;
      padding: 4px 6px;
      border-radius: 4px;
      position: relative;
    }
    #userBtn:hover { background: var(--bg3); color: var(--fg); }
    #userDropdown {
      display: none;
      position: fixed;
      top: 46px;
      right: 16px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 4px;
      min-width: 180px;
      z-index: 200;
      overflow: hidden;
    }
    #userDropdown.open { display: block; }
    #userDropdown .userLabel {
      padding: 8px 12px;
      font-size: 0.7rem;
      color: var(--fgDim);
      border-bottom: 1px solid var(--border);
    }
    #userDropdown .dropdownItem {
      padding: 8px 12px;
      font-size: 0.8rem;
      color: var(--fg);
      cursor: pointer;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
      font-family: 'IBM Plex Mono', monospace;
    }
    #userDropdown .dropdownItem:hover { background: var(--bg3); }
    #userDropdown .dropdownItem.danger { color: var(--danger); }
    #userDropdown .divider {
      height: 1px;
      background: var(--border);
      margin: 2px 0;
    }

    /* ── error banner ── */
    #errorBanner {
      display: none;
      background: var(--danger);
      color: #000;
      font-size: 0.8rem;
      padding: 6px 16px;
      text-align: center;
      flex-shrink: 0;
    }

    /* ── main content area ── */
    #main { flex: 1; overflow: auto; position: relative; }

    /* ── session list ── */
    #sessionList {
      height: 100%;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }
    #sessionItems { flex: 1; overflow-y: auto; }
    .sessionRow {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
    }
    .sessionRow:hover { background: var(--bg2); }
    .sessionRow .badge {
      font-size: 0.65rem;
      padding: 2px 6px;
      border-radius: 3px;
      font-weight: 500;
      flex-shrink: 0;
    }
    .sessionRow .badge.qwen { background: var(--accent2); color: #000; }
    .sessionRow .badge.claude { background: var(--accent3); color: #000; }
    .sessionRow .badge.llama { background: var(--accent); color: #000; }
    .sessionRow .rowTitle { flex: 1; font-size: 0.85rem; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
    .sessionRow .rowTime  { font-size: 0.7rem; color: var(--fgDim); flex-shrink: 0; }
    #newSessionArea {
      padding: 16px;
      border-top: 1px solid var(--border);
      background: var(--bg2);
      flex-shrink: 0;
    }
    #newSessionArea p { font-size: 0.8rem; color: var(--fgDim); margin-bottom: 10px; }
    .modelBtns { display: flex; gap: 10px; }
    .modelBtn {
      flex: 1;
      padding: 10px;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: var(--bg3);
      color: var(--fg);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.85rem;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .modelBtn:hover { border-color: var(--accent); }
    .modelBtn.qwen:hover  { border-color: var(--accent2); }
    .modelBtn.claude:hover { border-color: var(--accent3); }
    .modelBtn.llama:hover { border-color: var(--accent); }

    /* ── chat thread ── */
    #chatView {
      height: 100%;
      display: flex;
      flex-direction: column;
      display: none;
    }
    #messageThread {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .msgBubble {
      max-width: 85%;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .msgBubble.user  { align-self: flex-end; align-items: flex-end; }
    .msgBubble.assistant { align-self: flex-start; align-items: flex-start; }
    .msgBubble .roleLabel { font-size: 0.65rem; color: var(--fgDim); }
    .msgBubble .bubbleText {
      padding: 8px 12px;
      border-radius: 4px;
      font-size: 0.85rem;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
      border: 1px solid var(--border);
    }
    .msgBubble.user .bubbleText  { background: var(--accent); color: #000; border-color: var(--accent); }
    .msgBubble.assistant .bubbleText { background: var(--bg2); }
    .msgBubble .bubbleTime { font-size: 0.65rem; color: var(--fgDim); }
    .cursor::after { content: '▌'; animation: blink 1s step-end infinite; }
    @keyframes blink { 50% { opacity: 0; } }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid var(--fgDim); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; margin-left: 6px; }
    .agentTurn {
      display: flex;
      flex-direction: column;
      gap: 6px;
      align-self: flex-start;
      max-width: 90%;
    }
    .toolRow {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 4px;
      font-size: 0.75rem;
      overflow: hidden;
    }
    .toolRowHeader {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 10px;
      cursor: pointer;
      user-select: none;
      color: var(--fgDim);
    }
    .toolRowHeader:hover { background: var(--bg2); }
    .toolRowName { color: var(--accent2); font-weight: 500; flex-shrink: 0; }
    .toolRowPreview { flex: 1; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
    .toolRowToggle { flex-shrink: 0; }
    .toolRowBody {
      display: none;
      padding: 8px 10px;
      border-top: 1px solid var(--border);
      white-space: pre-wrap;
      word-break: break-all;
      color: var(--fg);
      max-height: 200px;
      overflow-y: auto;
      font-size: 0.75rem;
    }
    .toolRow.expanded .toolRowBody { display: block; }
    .thinkingBlock {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent3);
      border-radius: 4px;
      overflow: hidden;
    }
    .thinkingHeader {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 10px;
      cursor: pointer;
      user-select: none;
      color: var(--accent3);
      font-size: 0.75rem;
    }
    .thinkingHeader:hover { background: var(--bg2); }
    .thinkingToggle { flex-shrink: 0; }
    .thinkingBody {
      display: none;
      padding: 8px 10px;
      border-top: 1px solid var(--border);
      white-space: pre-wrap;
      word-break: break-word;
      color: var(--fgDim);
      font-style: italic;
      font-size: 0.78rem;
      line-height: 1.5;
      max-height: 300px;
      overflow-y: auto;
    }
    .thinkingBlock.expanded .thinkingBody { display: block; }
    .thinkingBlock.streaming .thinkingHeader { color: var(--accent3); }
    .cancelBtn {
      background: var(--danger);
      border: none;
      border-radius: 3px;
      color: #fff;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.7rem;
      padding: 2px 8px;
      cursor: pointer;
      margin-left: 8px;
      flex-shrink: 0;
    }
    .cancelBtn:hover { opacity: 0.8; }
    .cancelBtn:disabled { opacity: 0.4; cursor: default; }

    /* ── input bar ── */
    #inputBar {
      display: flex;
      gap: 8px;
      padding: 10px 16px;
      padding-bottom: calc(10px + env(safe-area-inset-bottom));
      border-top: 1px solid var(--border);
      background: var(--bg2);
      flex-shrink: 0;
    }
    #msgInput {
      flex: 1;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--fg);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 16px;
      padding: 8px 10px;
      resize: none;
      max-height: 8em;
      overflow-y: auto;
      line-height: 1.4;
    }
    #msgInput:focus { outline: none; border-color: var(--accent); }
    #sendBtn {
      background: var(--accent);
      border: none;
      border-radius: 4px;
      color: #000;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.85rem;
      font-weight: 500;
      padding: 0 14px;
      cursor: pointer;
      flex-shrink: 0;
    }
    #sendBtn:disabled { opacity: 0.4; cursor: default; }

    /* ── auth / password modals ── */
    #authModal, #passwordModal {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.8);
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    #authModal.visible, #passwordModal.visible { display: flex; }

    .authBox {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 24px;
      width: 90%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .authBox h2 { font-family: 'Bebas Neue', sans-serif; font-size: 1.3rem; letter-spacing: 0.05em; }
    .authBox input {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--fg);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.9rem;
      padding: 8px 10px;
    }
    .authBox input:focus { outline: none; border-color: var(--accent); }
    .authBox button {
      background: var(--accent);
      border: none;
      border-radius: 4px;
      color: #000;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.9rem;
      font-weight: 500;
      padding: 10px;
      cursor: pointer;
    }
  </style>
</head>
<body>

   <!-- auth modal -->
  <div id="authModal">
    <div class="authBox">
      <h2>AUTHENTICATE</h2>
      <div id="loginForm">
        <input id="usernameInput" type="text" placeholder="Username" autocomplete="username">
        <input id="passwordInput" type="password" placeholder="Password" autocomplete="current-password">
        <button id="authConfirm">Login</button>
        <div id="registerLink" style="display:none; margin-top: 8px;">
          <a href="#" id="showRegister" style="color: var(--accent); font-size: 0.8rem; text-decoration: none;">No account? Register first user</a>
        </div>
      </div>
      <div id="registerForm" style="display:none;">
        <input id="regUsernameInput" type="text" placeholder="Username" autocomplete="username">
        <input id="regPasswordInput" type="password" placeholder="Password (min 4 chars)" autocomplete="new-password">
        <button id="regConfirm" style="background: var(--accent3);">Register</button>
        <button id="backToLogin" style="background: var(--bg3); color: var(--fg); margin-top: 8px;">Back to login</button>
      </div>
    </div>
  </div>

  <!-- change password modal -->
  <div id="passwordModal">
    <div class="authBox">
      <h2>CHANGE PASSWORD</h2>
      <input id="currentPasswordInput" type="password" placeholder="Current password">
      <input id="newPasswordInput" type="password" placeholder="New password (min 4 chars)">
      <input id="confirmPasswordInput" type="password" placeholder="Confirm new password">
      <button id="passwordConfirm">Update Password</button>
      <button id="passwordCancel" style="background: var(--bg3); color: var(--fg); margin-top: 8px;">Cancel</button>
    </div>
  </div>

  <!-- top bar -->
  <div id="topBar">
    <button id="backBtn" title="Sessions">&#8592;</button>
    <div id="sessionBadge"></div>
    <h1 id="topTitle">CHAT</h1>
    <button id="userBtn" title="Account">&#9881;</button>
  </div>

  <!-- user dropdown (positioned relative to userBtn) -->
  <div id="userDropdown">
    <div class="userLabel" id="userDropdownLabel"></div>
    <button class="dropdownItem" id="dropdownChangeUser">Change User</button>
    <button class="dropdownItem" id="dropdownChangePassword">Change Password</button>
    <div class="divider"></div>
    <button class="dropdownItem danger" id="dropdownLogout">Logout</button>
  </div>

  <!-- error banner -->
  <div id="errorBanner"></div>

  <!-- main -->
  <div id="main">

    <!-- session list -->
    <div id="sessionList">
      <div id="sessionItems"></div>
      <div id="newSessionArea">
        <p>Start a new conversation:</p>
        <div class="modelBtns" id="modelBtns">
        </div>
      </div>
    </div>

    <!-- chat view -->
    <div id="chatView">
      <div id="messageThread"></div>
      <div id="inputBar">
        <textarea id="msgInput" rows="1" placeholder="Message\u2026"></textarea>
        <button id="sendBtn">Send</button>
      </div>
    </div>

  </div>

 <script>
  let authToken = localStorage.getItem('authToken') || '';
  let userRole = localStorage.getItem('userRole') || 'user';
  let currentSessionId = null;
  let currentModel = null;
  let isStreaming = false;
  let titleSet = false;
  var activeStreamAbort = null;
  var currentStreamingMsgId = null;

  if (!authToken) {
    document.getElementById('authModal').classList.add('visible');
  } else {
    init();
  }

  function showLoginForm() {
    document.getElementById('loginForm').style.display = 'block';
    document.getElementById('registerForm').style.display = 'none';
  }

  function showRegisterForm() {
    document.getElementById('loginForm').style.display = 'none';
    document.getElementById('registerForm').style.display = 'block';
  }

  document.getElementById('authConfirm').addEventListener('click', function() {
    var username = document.getElementById('usernameInput').value.trim();
    var password = document.getElementById('passwordInput').value;
    if (!username || !password) {
      showError('Username and password required');
      return;
    }
    fetch('/chat/auth', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: username, password: password })
    }).then(function(res) {
      if (!res.ok) throw new Error('unauthorized');
      return res.json();
     }).then(function(data) {
          authToken = data.token;
          userRole = data.role;
          localStorage.setItem('authToken', data.token);
          localStorage.setItem('userRole', data.role);
          localStorage.setItem('username', username);
          document.getElementById('authModal').classList.remove('visible');
          init();
       }).catch(function(e) {
         showError('Invalid credentials');
       });
  });

  document.getElementById('passwordInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      e.preventDefault();
      document.getElementById('authConfirm').click();
    }
  });

  document.getElementById('showRegister').addEventListener('click', function(e) {
    e.preventDefault();
    showRegisterForm();
  });

  document.getElementById('backToLogin').addEventListener('click', function() {
    showLoginForm();
  });

  document.getElementById('regConfirm').addEventListener('click', function() {
    var username = document.getElementById('regUsernameInput').value.trim();
    var password = document.getElementById('regPasswordInput').value;
    if (!username || password.length < 4) {
      showError('Username required and password must be >= 4 chars');
      return;
    }
    fetch('/chat/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: username, password: password })
    }).then(function(res) {
      if (!res.ok) throw new Error('registration failed');
      return res.json();
    }).then(function(data) {
      if (data.ok) {
        showError('Admin user created. Use the login form.');
        showLoginForm();
        document.getElementById('usernameInput').value = username;
        document.getElementById('passwordInput').value = password;
      } else {
        showError(data.error || 'Registration failed');
      }
    }).catch(function(e) {
      showError('Registration failed');
    });
  });

  document.getElementById('regPasswordInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      e.preventDefault();
      document.getElementById('regConfirm').click();
    }
  });

  // Registration link is always visible — server rejects if users already exist
  document.getElementById('registerLink').style.display = 'block';

  // ── User button / dropdown ────────────────────────────────────────────

  function updateUserLabel() {
    var label = document.getElementById('userDropdownLabel');
    if (label) {
      label.textContent = userRole === 'admin' ? (authToken ? (localStorage.getItem('username') || 'admin') + ' (admin)' : '') : (authToken ? (localStorage.getItem('username') || 'user') + ' (user)' : '');
    }
  }

  function closeDropdown() {
    var dd = document.getElementById('userDropdown');
    if (dd) dd.classList.remove('open');
  }

  document.getElementById('userBtn').addEventListener('click', function(e) {
    e.stopPropagation();
    var dd = document.getElementById('userDropdown');
    dd.classList.toggle('open');
    updateUserLabel();
  });

  document.addEventListener('click', function(e) {
    var dd = document.getElementById('userDropdown');
    var btn = document.getElementById('userBtn');
    if (dd && !dd.contains(e.target) && !btn.contains(e.target)) {
      closeDropdown();
    }
  });

  document.getElementById('dropdownLogout').addEventListener('click', function() {
    closeDropdown();
    localStorage.removeItem('authToken');
    localStorage.removeItem('userRole');
    localStorage.removeItem('username');
    localStorage.removeItem('lastSessionId');
    authToken = '';
    userRole = '';
    document.getElementById('authModal').classList.add('visible');
    showLoginForm();
  });

  document.getElementById('dropdownChangeUser').addEventListener('click', function() {
    closeDropdown();
    localStorage.removeItem('authToken');
    localStorage.removeItem('userRole');
    localStorage.removeItem('username');
    authToken = '';
    userRole = '';
    document.getElementById('authModal').classList.add('visible');
    showLoginForm();
  });

  document.getElementById('dropdownChangePassword').addEventListener('click', function() {
    closeDropdown();
    document.getElementById('passwordModal').classList.add('visible');
    document.getElementById('currentPasswordInput').value = '';
    document.getElementById('newPasswordInput').value = '';
    document.getElementById('confirmPasswordInput').value = '';
  });

  document.getElementById('passwordConfirm').addEventListener('click', function() {
    var oldPw = document.getElementById('currentPasswordInput').value;
    var newPw = document.getElementById('newPasswordInput').value;
    var confirmPw = document.getElementById('confirmPasswordInput').value;
    if (!oldPw) { showError('Current password required'); return; }
    if (newPw.length < 4) { showError('New password must be >= 4 chars'); return; }
    if (newPw !== confirmPw) { showError('Passwords do not match'); return; }
    makeFetch('/chat/change-password', {
      method: 'POST',
      body: { oldPassword: oldPw, newPassword: newPw }
    }).then(function(res) {
      if (!res.ok) return res.json().then(function(d) { throw new Error(d.error || 'failed'); });
      document.getElementById('passwordModal').classList.remove('visible');
      showError('Password updated successfully');
    }).catch(function(e) {
      showError(e.message || 'Failed to change password');
    });
  });

  document.getElementById('passwordCancel').addEventListener('click', function() {
    document.getElementById('passwordModal').classList.remove('visible');
  });

  document.getElementById('currentPasswordInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') document.getElementById('passwordConfirm').click();
  });

  document.getElementById('newPasswordInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') document.getElementById('passwordConfirm').click();
  });

  document.getElementById('confirmPasswordInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') document.getElementById('passwordConfirm').click();
  });

  function init() {
    document.getElementById('userBtn').style.display = 'block';
    updateUserLabel();
    renderModelButtons();
    loadSessions();
  }

  function renderModelButtons() {
    var container = document.getElementById('modelBtns');
    container.innerHTML = '';
    if (userRole === 'admin') {
      var qwenBtn = document.createElement('button');
      qwenBtn.className = 'modelBtn qwen';
      qwenBtn.textContent = 'Qwen';
      qwenBtn.onclick = function() { createSession('qwen'); };
      container.appendChild(qwenBtn);
      var claudeBtn = document.createElement('button');
      claudeBtn.className = 'modelBtn claude';
      claudeBtn.textContent = 'Claude';
      claudeBtn.onclick = function() { createSession('claude'); };
      container.appendChild(claudeBtn);
    }
    var llamaBtn = document.createElement('button');
    llamaBtn.className = 'modelBtn llama';
    llamaBtn.textContent = 'Llama';
    llamaBtn.onclick = function() { createSession('llama'); };
    container.appendChild(llamaBtn);
  }

  function showSessionListView() {
    if (activeStreamAbort) { activeStreamAbort.abort(); activeStreamAbort = null; }
    currentStreamingMsgId = null;
    isStreaming = false;
    document.querySelectorAll('#inputBar .cancelBtn').forEach(function(b) { b.remove(); });
    var sendBtn = document.getElementById('sendBtn');
    if (sendBtn) sendBtn.disabled = false;
    var msgInput = document.getElementById('msgInput');
    if (msgInput) msgInput.disabled = false;
    closeDropdown();
    document.getElementById('passwordModal').classList.remove('visible');
    document.getElementById('chatView').style.display = 'none';
    document.getElementById('sessionList').style.display = 'flex';
    document.getElementById('backBtn').style.display = 'none';
    document.getElementById('sessionBadge').style.display = 'none';
    document.getElementById('topTitle').textContent = 'CHAT';
    currentSessionId = null;
    titleSet = false;
  }

  function showChatView(sessionId, model, title) {
    closeDropdown();
    updateUserLabel();
    document.getElementById('sessionList').style.display = 'none';
    document.getElementById('chatView').style.display = 'flex';
    document.getElementById('backBtn').style.display = 'block';
    var badge = document.getElementById('sessionBadge');
    badge.textContent = model === 'qwen' ? 'Q' : (model === 'claude' ? 'C' : 'L');
    badge.className = 'badge ' + model;
    badge.style.display = 'inline-block';
    var displayTitle = title || sessionId;
    document.getElementById('topTitle').textContent = displayTitle.slice(0, 30);
    localStorage.setItem('lastSessionId', sessionId);
  }

  function makeFetch(url, opts) {
    opts = opts || {};
    opts.headers = opts.headers || {};
    opts.headers['Authorization'] = 'Bearer ' + authToken;
    if (opts.body && typeof opts.body === 'object') {
      opts.headers['Content-Type'] = 'application/json';
      opts.body = JSON.stringify(opts.body);
    }
    return fetch(url, opts);
  }

  async function loadSessions() {
    try {
      var res = await makeFetch('/chat/sessions');
      if (!res.ok) throw new Error('unauthorized');
      var sessions = await res.json();
      var container = document.getElementById('sessionItems');
      container.innerHTML = '';
      for (var i = 0; i < sessions.length; i++) {
        var s = sessions[i];
        var row = document.createElement('div');
        row.className = 'sessionRow';
        var badgeText = s.model === 'qwen' ? 'Q' : (s.model === 'claude' ? 'C' : 'L');
        row.innerHTML = '<span class="badge ' + s.model + '">' + badgeText + '</span>' +
          '<span class="rowTitle">' + escapeHtml(s.title || s.id) + '</span>' +
          '<span class="rowTime">' + formatTime(s.createdAt) + '</span>';
        (function(session) {
          row.addEventListener('click', function() {
            openSession(session.id, session.model, session.title);
          });
        })(s);
        container.appendChild(row);
      }
    } catch(e) {
      showError('Failed to load sessions');
    }
  }

  async function createSession(model) {
    try {
      var res = await makeFetch('/chat/sessions', { method: 'POST', body: { model: model } });
      if (!res.ok) throw new Error('failed');
      var data = await res.json();
      titleSet = false;
      openSession(data.id, data.model, data.id);
    } catch(e) {
      showError('Failed to create session');
    }
  }

  async function openSession(id, model, title) {
    if (activeStreamAbort) { activeStreamAbort.abort(); activeStreamAbort = null; }
    currentStreamingMsgId = null;
    isStreaming = false;
    document.querySelectorAll('#inputBar .cancelBtn').forEach(function(b) { b.remove(); });
    var sendBtn = document.getElementById('sendBtn');
    if (sendBtn) sendBtn.disabled = false;
    var msgInput = document.getElementById('msgInput');
    if (msgInput) msgInput.disabled = false;
    currentSessionId = id;
    currentModel = model;
    titleSet = false;
    await loadHistory(id);
    showChatView(id, model, title || id);
  }

  function subscribeToStream(sessionId, messageId, sinceSeq, callbacks) {
    var url = '/chat/sessions/' + sessionId + '/messages/' + messageId + '/stream?sinceSeq=' + sinceSeq;
    var abortController = new AbortController();
    var reader = null;
    var decoder = new TextDecoder();
    var buffer = '';

    fetch(url, {
      headers: { 'Authorization': 'Bearer ' + authToken },
      signal: abortController.signal
    }).then(function(res) {
      if (!res.ok) {
        callbacks.onError('stream error: ' + res.status);
        return;
      }
      reader = res.body.getReader();
      return readLoop();
    }).catch(function(err) {
      callbacks.onError(err.message || String(err));
    });

    function readLoop() {
      if (!reader) return;
      return reader.read().then(function(result) {
        var done = result.done;
        var value = result.value;
        if (done) {
          callbacks.onDone();
          return;
        }
        buffer += decoder.decode(value, { stream: true });
        var lines = buffer.split('\n');
        buffer = lines.pop();
        for (var i = 0; i < lines.length; i++) {
          var line = lines[i];
          if (line.indexOf('data: ') === 0) {
            try {
              var obj = JSON.parse(line.slice(6));
              if (obj.kind === 'committed') {
                callbacks.onCommitted(obj.seq, obj.type, obj.payload);
              } else if (obj.kind === 'delta') {
                callbacks.onDelta(obj.blockIndex, obj.blockType, obj.textChunk);
              } else if (obj.kind === 'status') {
                callbacks.onStatus(obj.status);
              }
            } catch(e) {
              // skip malformed
            }
          }
        }
        return readLoop();
      }).catch(function(err) {
        if (err.name !== 'AbortError') {
          callbacks.onError(err.message || String(err));
        }
      });
    }

    activeStreamAbort = abortController;
    return { abort: function() { activeStreamAbort = null; abortController.abort(); } };
  }

  function renderAssistantBubble(wrapper) {
    var committedBlocks = [];
    var liveBlocks = {};
    var currentTextDiv = null;
    var currentBubbleEl = null;
    var thinkingWidget = null;
    var bubbleCreated = false;
    var highestSeq = 0;
    var toolResultPending = null;
    var finalStatus = null;
    var cancelBtnEl = null;

    function ensureBubble() {
      if (!bubbleCreated) {
        currentBubbleEl = document.createElement('div');
        currentBubbleEl.className = 'msgBubble assistant';
        var roleLabel = document.createElement('span');
        roleLabel.className = 'roleLabel';
        roleLabel.textContent = currentModel || 'assistant';
        var textDiv = document.createElement('div');
        textDiv.className = 'bubbleText';
        var timeSpan = document.createElement('span');
        timeSpan.className = 'bubbleTime';
        timeSpan.textContent = formatTime(Math.floor(Date.now() / 1000));
        currentBubbleEl.appendChild(roleLabel);
        currentBubbleEl.appendChild(textDiv);
        currentBubbleEl.appendChild(timeSpan);
        wrapper.appendChild(currentBubbleEl);
        currentTextDiv = textDiv;
        bubbleCreated = true;
      }
    }

    function scrollToBottom() {
      var thread = document.getElementById('messageThread');
      var isNearBottom = (thread.scrollHeight - thread.scrollTop - thread.clientHeight) < 100;
      if (isNearBottom) {
        thread.scrollTop = thread.scrollHeight;
      }
    }

    function onDelta(blockIndex, blockType, textChunk) {
      if (blockType === 'thinking') {
        if (currentTextDiv) { currentTextDiv.classList.remove('cursor'); currentTextDiv = null; }
        if (!thinkingWidget) thinkingWidget = createThinkingBlock(wrapper);
        thinkingWidget.append(textChunk);
        liveBlocks[blockIndex] = true;
        scrollToBottom();
      } else if (blockType === 'text') {
        ensureBubble();
        if (thinkingWidget) { thinkingWidget.finish(); thinkingWidget = null; }
        currentTextDiv.textContent += textChunk;
        currentTextDiv.classList.add('cursor');
        liveBlocks[blockIndex] = true;
        scrollToBottom();
      } else if (blockType === 'tool') {
        if (currentTextDiv) { currentTextDiv.classList.remove('cursor'); currentTextDiv = null; }
        if (thinkingWidget) { thinkingWidget.finish(); thinkingWidget = null; }
        var payload = textChunk;
        if (typeof payload === 'string') payload = JSON.parse(payload);
        appendToolRowLive(wrapper, payload.name, payload.input);
      }
    }

    function onCommitted(seq, type, payload) {
      if (seq > highestSeq) highestSeq = seq;
      if (type === 'thinking') {
        if (liveBlocks[seq]) {
          delete liveBlocks[seq];
          return;
        }
        var tw = createThinkingBlock(wrapper);
        tw.append(payload.content || '');
        tw.finish();
      } else if (type === 'text') {
        if (liveBlocks[seq]) {
          ensureBubble();
          currentTextDiv.textContent = payload.content || '';
          delete liveBlocks[seq];
          return;
        }
        ensureBubble();
        currentTextDiv.textContent += (payload.content || '');
      } else if (type === 'tool') {
        appendToolRowLive(wrapper, payload.name, payload.input);
      } else if (type === 'toolResult') {
        appendToolResultLive(wrapper, payload.output || '');
      } else if (type === 'error') {
        ensureBubble();
        var errSpan = document.createElement('span');
        errSpan.style.color = 'var(--danger)';
        errSpan.textContent = payload.reason || 'Error';
        currentTextDiv.appendChild(errSpan);
      }
      committedBlocks.push({seq: seq, type: type, payload: payload});
    }

    function onStatus(status) {
      finalStatus = status;
      if (currentTextDiv) currentTextDiv.classList.remove('cursor');
      if (thinkingWidget) { thinkingWidget.finish(); thinkingWidget = null; }
      if (cancelBtnEl) cancelBtnEl.style.display = 'none';
    }

    function onError(reason) {
      if (currentTextDiv) currentTextDiv.classList.remove('cursor');
      if (cancelBtnEl) cancelBtnEl.style.display = 'none';
      if (reason) showError(reason);
    }

    function onDone() {
      if (finalStatus === 'streaming' || finalStatus === null) {
        finalStatus = 'complete';
        if (currentTextDiv) currentTextDiv.classList.remove('cursor');
        if (cancelBtnEl) cancelBtnEl.style.display = 'none';
      }
    }

    wrapper._streamState = {
      onDelta: onDelta,
      onCommitted: onCommitted,
      onStatus: onStatus,
      onError: onError,
      onDone: onDone,
      getHighestSeq: function() { return highestSeq; },
      getCancelBtn: function() { return cancelBtnEl; },
      isFinal: function() { return finalStatus !== null; }
    };

    return wrapper;
  }

  function appendToolRowLive(wrapper, toolName, input) {
    var preview = '';
    if (input && typeof input === 'object') {
      var vals = Object.values(input).filter(function(v){ return typeof v === 'string'; });
      preview = vals.length ? vals[0].slice(0, 80) : JSON.stringify(input).slice(0, 80);
    } else if (input) {
      preview = String(input).slice(0, 80);
    }
    var inputStr = (input && typeof input === 'object') ? JSON.stringify(input, null, 2) : String(input || '');

    var row = document.createElement('div');
    row.className = 'toolRow';

    var header = document.createElement('div');
    header.className = 'toolRowHeader';
    header.innerHTML =
      '<span class="toolRowName">' + escapeHtml(toolName) + '</span>' +
      '<span class="toolRowPreview">' + escapeHtml(preview) + '</span>' +
      '<span class="toolRowToggle">▸</span>';
    header.onclick = function() {
      row.classList.toggle('expanded');
      header.querySelector('.toolRowToggle').textContent =
        row.classList.contains('expanded') ? '▾' : '▸';
    };

    var body = document.createElement('div');
    body.className = 'toolRowBody';
    body.textContent = inputStr;

    row.appendChild(header);
    row.appendChild(body);
    wrapper.appendChild(row);
  }

  function appendToolResultLive(wrapper, output) {
    var row = document.createElement('div');
    row.className = 'toolRow';
    var header = document.createElement('div');
    header.className = 'toolRowHeader';
    header.innerHTML = '<span class="toolRowName">tool result</span><span class="toolRowToggle">▸</span>';
    header.onclick = function() { row.classList.toggle('expanded'); header.querySelector('.toolRowToggle').textContent = row.classList.contains('expanded') ? '▾' : '▸'; };
    var body = document.createElement('div');
    body.className = 'toolRowBody';
    body.textContent = String(output || '');
    row.appendChild(header);
    row.appendChild(body);
    wrapper.appendChild(row);
  }

  async function loadHistory(sessionId) {
    try {
      var res = await makeFetch('/chat/sessions/' + sessionId + '/history');
      if (!res.ok) throw new Error('unauthorized');
      var history = await res.json();
      var thread = document.getElementById('messageThread');
      thread.innerHTML = '';
      for (var i = 0; i < history.length; i++) {
        var msg = history[i];
        if (msg.role === 'user') {
          appendMessage('user', msg.content, msg.createdAt, false);
          continue;
        }
        if (msg.role === 'assistant') {
          var events;
          try { events = JSON.parse(msg.events); } catch(e) { events = null; }
          var wrapper = document.createElement('div');
          wrapper.className = 'agentTurn';
          thread.appendChild(wrapper);
          renderAssistantBubble(wrapper);
          if (events && events.length) {
            for (var j = 0; j < events.length; j++) {
              var evt = events[j];
              var evtPayload = { content: evt.content || '', name: evt.tool || evt.name || '', input: evt.input || {}, output: evt.output || '', reason: evt.content || evt.reason || '' };
              var evtType = evt.type;
              var evtSeq = evt.seq || j;
              if (evtType === 'toolResult') {
                wrapper._streamState.onCommitted(evtSeq, 'toolResult', { output: evt.output || '' });
              } else if (evtType === 'error') {
                wrapper._streamState.onCommitted(evtSeq, 'error', { reason: evt.reason || evt.content || '' });
              } else {
                wrapper._streamState.onCommitted(evtSeq, evtType, evtPayload);
              }
            }
          }
          var highestSeq = wrapper._streamState.getHighestSeq();
          if (msg.status === 'streaming') {
            subscribeToStream(sessionId, msg.id, highestSeq, {
              onDelta: function(bi, bt, tc) { wrapper._streamState.onDelta(bi, bt, tc); },
              onCommitted: function(s, t, p) { wrapper._streamState.onCommitted(s, t, p); },
              onStatus: function(st) { wrapper._streamState.onStatus(st); },
              onError: function(err) { showError(err); },
              onDone: function() {}
            });
            var cancelBtn = document.createElement('button');
            cancelBtn.className = 'cancelBtn';
            cancelBtn.textContent = 'Stop';
            cancelBtn.style.marginLeft = '8px';
            cancelBtn.style.position = 'absolute';
            cancelBtn.style.right = '16px';
            cancelBtn.style.top = '10px';
            cancelBtn.onclick = function() { cancelStream(sessionId, msg.id, cancelBtn); };
            document.getElementById('inputBar').appendChild(cancelBtn);
          }
          continue;
        }
        if (msg.content) appendMessage(msg.role, msg.content, msg.createdAt, false);
      }
      thread.scrollTop = thread.scrollHeight;
    } catch(e) {
      showError('Failed to load history');
    }
  }

  function appendMessage(role, content, ts, streaming) {
    var bubble = document.createElement('div');
    bubble.className = 'msgBubble ' + role;

    var roleLabel = document.createElement('span');
    roleLabel.className = 'roleLabel';
    roleLabel.textContent = role === 'user' ? 'you' : (currentModel || 'assistant');

    var textDiv = document.createElement('div');
    textDiv.className = 'bubbleText';
    textDiv.textContent = content;
    if (streaming === true) textDiv.classList.add('cursor');

    var timeSpan = document.createElement('span');
    timeSpan.className = 'bubbleTime';
    if (ts) timeSpan.textContent = formatTime(ts);

    bubble.appendChild(roleLabel);
    bubble.appendChild(textDiv);
    bubble.appendChild(timeSpan);

    document.getElementById('messageThread').appendChild(bubble);

    var thread = document.getElementById('messageThread');
    thread.scrollTop = thread.scrollHeight;

    return textDiv;
  }

  async function sendMessage() {
    if (isStreaming || !currentSessionId) return;

    var input = document.getElementById('msgInput');
    var content = input.value.trim();
    if (!content) return;

    isStreaming = true;
    titleSet = false;
    document.getElementById('sendBtn').disabled = true;
    input.disabled = true;
    input.value = '';
    input.style.height = 'auto';

    appendMessage('user', content, Date.now() / 1000, false);

    var wrapper = document.createElement('div');
    wrapper.className = 'agentTurn';
    document.getElementById('messageThread').appendChild(wrapper);
    renderAssistantBubble(wrapper);

    // Add cancel button
    var cancelBtn = document.createElement('button');
    cancelBtn.className = 'cancelBtn';
    cancelBtn.textContent = 'Stop';
    cancelBtn.style.position = 'absolute';
    cancelBtn.style.right = '16px';
    cancelBtn.style.top = '10px';
    cancelBtn.onclick = function() { cancelCurrentStream(); };

    try {
      var res = await makeFetch('/chat/sessions/' + currentSessionId + '/message', {
        method: 'POST',
        body: { content: content }
      });

      if (!res.ok) {
        var errBody = await res.json().catch(function() { return {}; });
        throw new Error(errBody.error || ('HTTP ' + res.status));
      }

      var data = await res.json();
      var assistantMsgId = data.assistantMessageId;
      currentStreamingMsgId = assistantMsgId;

      // Show cancel button
      document.getElementById('inputBar').appendChild(cancelBtn);

      subscribeToStream(currentSessionId, assistantMsgId, 0, {
        onDelta: function(bi, bt, tc) { wrapper._streamState.onDelta(bi, bt, tc); },
        onCommitted: function(s, t, p) { wrapper._streamState.onCommitted(s, t, p); },
        onStatus: function(st) {
          wrapper._streamState.onStatus(st);
          if (st === 'complete' || st === 'canceled' || st === 'error') {
            cancelBtn.style.display = 'none';
            onStreamDone(st);
          }
        },
        onError: function(err) {
          cancelBtn.style.display = 'none';
          showError(err);
          onStreamDone('error');
        },
        onDone: function() {
          cancelBtn.style.display = 'none';
          if (!wrapper._streamState.isFinal()) {
            wrapper._streamState.onStatus('complete');
            onStreamDone('complete');
          }
        }
      });

      function onStreamDone(finalStatus) {
        isStreaming = false;
        currentStreamingMsgId = null;
        document.getElementById('sendBtn').disabled = false;
        var msgInput = document.getElementById('msgInput');
        msgInput.disabled = false;
        msgInput.focus();
        var thread = document.getElementById('messageThread');
        thread.scrollTop = thread.scrollHeight;
      }

    } catch(e) {
      isStreaming = false;
      document.getElementById('sendBtn').disabled = false;
      var msgInput = document.getElementById('msgInput');
      msgInput.disabled = false;
      msgInput.focus();
      showError(e.message || 'Connection error');
      cancelBtn.style.display = 'none';
    }
  }

  function cancelCurrentStream() {
    if (activeStreamAbort) {
      activeStreamAbort.abort();
      activeStreamAbort = null;
    }
    if (!currentSessionId || !currentStreamingMsgId) return;
    var thread = document.getElementById('messageThread');
    var bubbles = thread.querySelectorAll('.agentTurn');
    var lastBubble = bubbles[bubbles.length - 1];
    if (!lastBubble || !lastBubble._streamState || lastBubble._streamState.isFinal()) return;

    var cancelBtnEl = document.getElementById('inputBar').querySelector('.cancelBtn');

    if (cancelBtnEl) cancelBtnEl.disabled = true;

    makeFetch('/chat/sessions/' + currentSessionId + '/messages/' + currentStreamingMsgId + '/cancel', { method: 'POST' })
      .then(function(res) { return res.json(); })
      .then(function(data) {
        if (cancelBtnEl) cancelBtnEl.disabled = false;
      })
      .catch(function(e) {
        showError('Cancel failed: ' + e.message);
        if (cancelBtnEl) cancelBtnEl.disabled = false;
      });
  }

  function cancelStream(sessionId, messageId, cancelBtn) {
    makeFetch('/chat/sessions/' + sessionId + '/messages/' + messageId + '/cancel', { method: 'POST' })
      .then(function(res) { return res.json(); })
      .then(function(data) {
        if (cancelBtn) cancelBtn.style.display = 'none';
      })
      .catch(function(e) {
        showError('Cancel failed: ' + e.message);
        if (cancelBtn) { cancelBtn.disabled = false; }
      });
  }

  function escapeHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function createThinkingBlock(wrapper) {
    var block = document.createElement('div');
    block.className = 'thinkingBlock expanded';

    var header = document.createElement('div');
    header.className = 'thinkingHeader';
    header.innerHTML = '<span style=\"flex:1\">thinking…</span><span class=\"thinkingToggle\">▾</span>';
    header.onclick = function() {
      block.classList.toggle('expanded');
      header.querySelector('.thinkingToggle').textContent =
        block.classList.contains('expanded') ? '▾' : '▸';
    };

    var body = document.createElement('div');
    body.className = 'thinkingBody';

    block.appendChild(header);
    block.appendChild(body);
    wrapper.appendChild(block);

    return {
      block: block,
      body: body,
      header: header,
      append: function(text) {
        body.textContent += text;
        if (block.classList.contains('expanded')) {
          body.scrollTop = body.scrollHeight;
        }
      },
      finish: function() {
        block.classList.remove('streaming');
        block.classList.remove('expanded');
        header.querySelector('span').textContent = 'thinking';
        header.querySelector('.thinkingToggle').textContent = '▸';
      }
    };
  }

  function appendToolRow(wrapper, toolName, input, output) {
    var preview = '';
    if (input && typeof input === 'object') {
      var vals = Object.values(input).filter(function(v){ return typeof v === 'string'; });
      preview = vals.length ? vals[0].slice(0, 80) : JSON.stringify(input).slice(0, 80);
    } else if (input) {
      preview = String(input).slice(0, 80);
    }
    var inputStr = (input && typeof input === 'object') ? JSON.stringify(input, null, 2) : String(input || '');
    var outputStr = String(output || '');
    var bodyText = (inputStr ? inputStr + '\n\n' : '') + outputStr;

    var row = document.createElement('div');
    row.className = 'toolRow';

    var header = document.createElement('div');
    header.className = 'toolRowHeader';
    header.innerHTML =
      '<span class=\"toolRowName\">' + escapeHtml(toolName) + '</span>' +
      '<span class=\"toolRowPreview\">' + escapeHtml(preview) + '</span>' +
      '<span class=\"toolRowToggle\">▸</span>';
    header.onclick = function() {
      row.classList.toggle('expanded');
      header.querySelector('.toolRowToggle').textContent =
        row.classList.contains('expanded') ? '▾' : '▸';
    };

    var body = document.createElement('div');
    body.className = 'toolRowBody';
    body.textContent = bodyText;

    row.appendChild(header);
    row.appendChild(body);
    wrapper.appendChild(row);
  }

  function createTextBubble(wrapper) {
    var bubble = document.createElement('div');
    bubble.className = 'msgBubble assistant';
    var roleLabel = document.createElement('span');
    roleLabel.className = 'roleLabel';
    roleLabel.textContent = currentModel || 'assistant';
    var textDiv = document.createElement('div');
    textDiv.className = 'bubbleText cursor';
    var timeSpan = document.createElement('span');
    timeSpan.className = 'bubbleTime';
    bubble.appendChild(roleLabel);
    bubble.appendChild(textDiv);
    bubble.appendChild(timeSpan);
    wrapper.appendChild(bubble);
    return textDiv;
  }

  function formatTime(unixSec) {
    if (!unixSec) return '';
    var d = new Date(unixSec * 1000);
    var h = String(d.getHours()).padStart(2, '0');
    var m = String(d.getMinutes()).padStart(2, '0');
    return h + ':' + m;
  }

  function showError(msg) {
    var banner = document.getElementById('errorBanner');
    banner.textContent = msg;
    banner.style.display = 'block';
    setTimeout(function() { banner.style.display = 'none'; }, 4000);
  }

  document.getElementById('backBtn').addEventListener('click', function() {
    showSessionListView();
    loadSessions();
  });

  document.getElementById('sendBtn').addEventListener('click', sendMessage);

  document.getElementById('msgInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  document.getElementById('msgInput').addEventListener('input', function() {
    var input = document.getElementById('msgInput');
    input.style.height = 'auto';
    input.style.height = input.scrollHeight + 'px';
  });

  document.addEventListener('keydown', function(e) {
     if (e.key === 'Escape' && currentSessionId) {
       showSessionListView();
       loadSessions();
     }
   });

    // Register service worker for PWA install
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(function() {});
    }
