<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Wall Editor</title>
  <link rel="stylesheet" href="/colors.css">
  <script src="https://cdn.jsdelivr.net/npm/interactjs@1.10.27/dist/interact.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;700&family=Inter:wght@300;400;600&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { display: grid; grid-template-columns: 280px 1fr; grid-template-rows: 100vh; height: 100vh; overflow: hidden; background: #0d0d0d; color: #e0e0e0; font-family: 'Inter', 'IBM Plex Mono', system-ui, sans-serif; }

    #sidebar { overflow-y: auto; border-right: 1px solid #222; padding: 16px; display: flex; flex-direction: column; gap: 20px; }
    #mainArea { overflow: auto; display: flex; align-items: flex-start; justify-content: center; padding: 24px; }

    .sidebarTitle { font-size: 20px; font-weight: 600; letter-spacing: 0.5px; }
    .sidebarSubtitle { font-size: 12px; color: #888; margin-top: 2px; }
    .previewBtn { display: inline-block; margin-top: 8px; padding: 4px 12px; background: #222; border: 1px solid #333; border-radius: 4px; color: #aaa; text-decoration: none; font-size: 12px; cursor: pointer; }
    .previewBtn:hover { border-color: #4a9eff; color: #4a9eff; }

    .sectionLabel { font-size: 11px; font-weight: 600; color: #666; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 10px; }

    .paletteGrid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; }
    .paletteBtn { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 8px; padding: 12px 6px; text-align: center; cursor: pointer; color: #ccc; font-size: 12px; font-family: 'IBM Plex Mono', monospace; transition: all 0.15s; }
    .paletteBtn:hover { border-color: #4a9eff; background: #1e2028; color: #4a9eff; }
    .paletteBtn .paletteIcon { display: block; font-size: 20px; margin-bottom: 4px; }

    .sizeInputs { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
    .sizeInputs input { width: 60px; background: #1a1a1a; border: 1px solid #333; border-radius: 4px; padding: 6px 8px; color: #eee; font-size: 13px; text-align: center; }
    .sizeInputs span { color: #555; font-size: 12px; }
    .smallBtn { padding: 6px 12px; background: #2a2a2a; border: 1px solid #333; border-radius: 4px; color: #ccc; font-size: 12px; cursor: pointer; }
    .smallBtn:hover { border-color: #4a9eff; color: #4a9eff; }

    .bgToggle { display: flex; gap: 4px; margin-bottom: 10px; }
    .bgToggle .smallBtn.active { border-color: #4a9eff; color: #4a9eff; }
    .bgOption { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .bgOption input[type="color"] { width: 40px; height: 32px; border: 1px solid #333; border-radius: 4px; background: #1a1a1a; cursor: pointer; }
    .bgOption input[type="file"] { font-size: 12px; color: #888; }

    #layerList { display: flex; flex-direction: column; gap: 2px; }
    .layerItem { display: flex; align-items: center; gap: 8px; padding: 4px 6px; font-size: 12px; border-radius: 4px; border-left: 2px solid transparent; }
    .layerItem.selected { border-left-color: #4a9eff; background: rgba(74,158,255,0.05); }
    .layerItem button { background: none; border: none; color: #888; cursor: pointer; font-size: 14px; padding: 0 2px; }
    .layerItem button:hover { color: #4a9eff; }
    .layerName { flex: 1; font-family: 'IBM Plex Mono', monospace; }

    .saveArea { margin-top: auto; padding-top: 16px; border-top: 1px solid #222; }
    #saveBtn { width: 100%; padding: 12px; background: #4a9eff; border: none; border-radius: 6px; color: #fff; font-size: 14px; font-weight: 600; cursor: pointer; margin-bottom: 8px; }
    #saveBtn:hover { background: #3a8eef; }
    #saveBtn:disabled { opacity: 0.5; cursor: not-allowed; }
    #saveStatus { font-size: 12px; text-align: center; min-height: 18px; }

    #canvasWrapper { position: relative; flex-shrink: 0; }
    #editorCanvas { position: relative; }

    .widget { position: absolute; overflow: hidden; box-sizing: border-box; }
    .widget-clock { display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .widget-text { display: flex; align-items: center; }
    .widget-countdown { display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .widget-image { display: flex; align-items: center; justify-content: center; }
    .widget-calendar { display: flex; flex-direction: column; }
   .widget-timer { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; }
    .widget-list { display: flex; flex-direction: column; }
    .edWidget { position: absolute; border: 2px solid rgba(255,255,255,0.2); border-radius: 4px; box-sizing: border-box; cursor: move; user-select: none; min-width: 80px; min-height: 60px; overflow: hidden; }
    .edWidget.selected { border-color: #4a9eff; }
    .edWidget:hover { border-color: rgba(255,255,255,0.6); }
    .edWidget:hover .edWidgetHeader { opacity: 1; pointer-events: auto; }
    .edWidgetHeader { position: absolute; top: 0; left: 0; right: 0; z-index: 10; display: flex; align-items: center; padding: 4px 8px; background: rgba(0,0,0,0.75); gap: 6px; font-size: 11px; opacity: 0; pointer-events: none; transition: opacity 0.15s; }
    .edWidgetLabel { flex: 1; font-family: 'IBM Plex Mono', monospace; text-transform: uppercase; letter-spacing: 1px; opacity: 0.8; }
    .edWidgetConfig, .edWidgetDelete { background: none; border: none; color: #aaa; cursor: pointer; padding: 2px 4px; font-size: 12px; }
    .edWidgetConfig:hover { color: #4a9eff; }
    .edWidgetDelete:hover { color: #ff4a4a; }

    .resizeHandles { display: none; }
    .edWidget.selected .resizeHandles { display: block; }
    .resizeHandle { position: absolute; width: 12px; height: 12px; background: #4a9eff; border: 2px solid #0d0d0d; border-radius: 50%; }

    #configModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 1000; align-items: center; justify-content: center; }
    #configModal.show { display: flex; }
    #configPanel { background: #1a1a1a; border: 1px solid #333; border-radius: 12px; padding: 32px; min-width: 400px; max-width: 600px; max-height: 80vh; overflow-y: auto; }
    #configTitle { margin: 0; font-size: 20px; }
    .configClose { background: none; border: none; color: #aaa; font-size: 20px; cursor: pointer; }
    .configClose:hover { color: #fff; }
    .configFooter { margin-top: 24px; display: flex; gap: 12px; justify-content: flex-end; }
    .configCancel { padding: 10px 20px; background: #333; border: none; color: #ccc; border-radius: 6px; cursor: pointer; }
    .configApply { padding: 10px 20px; background: #4a9eff; border: none; color: #fff; border-radius: 6px; cursor: pointer; font-weight: 600; }
    .configApply:hover { background: #3a8eef; }
    .configField { margin-bottom: 16px; }
    .configField label { display: block; font-size: 12px; color: #888; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1px; }
    .configInput { width: 100%; box-sizing: border-box; background: #2a2a2a; border: 1px solid #444; border-radius: 6px; padding: 10px 12px; color: #eee; font-size: 14px; font-family: inherit; }
    .configInput:focus { border-color: #4a9eff; outline: none; }
    .configSlider { width: 100%; accent-color: #4a9eff; }
    .configColorInput { width: 60px; height: 40px; border: none; background: none; cursor: pointer; }
    .configCheck { display: flex; align-items: center; gap: 8px; cursor: pointer; }
    .configCheck input { accent-color: #4a9eff; }
    .configTextarea { width: 100%; box-sizing: border-box; background: #2a2a2a; border: 1px solid #444; border-radius: 6px; padding: 10px 12px; color: #eee; font-size: 14px; font-family: inherit; resize: vertical; min-height: 80px; }
    .configTextarea:focus { border-color: #4a9eff; outline: none; }
    .configSelect { width: 100%; box-sizing: border-box; background: #2a2a2a; border: 1px solid #444; border-radius: 6px; padding: 10px 12px; color: #eee; font-size: 14px; font-family: inherit; cursor: pointer; }
    .configSelect:focus { border-color: #4a9eff; outline: none; }

    #canvasWrapper::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(45deg, #1a1a1a 25%, transparent 25%),
        linear-gradient(-45deg, #1a1a1a 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #1a1a1a 75%),
        linear-gradient(-45deg, transparent 75%, #1a1a1a 75%);
      background-size: 20px 20px;
      background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
      opacity: 0.3;
      pointer-events: none;
      z-index: 0;
    }
    #editorCanvas { position: relative; z-index: 1; }
  </style>
</head>
<body>
  <div id="sidebar">
    <div>
      <div class="sidebarTitle">Wall Editor</div>
      <div class="sidebarSubtitle">Drag • Resize • Configure</div>
      <a href="/wall" target="_blank" class="previewBtn">Preview ↗</a>
    </div>

    <div>
      <div class="sectionLabel">Add Widget</div>
      <div class="paletteGrid">
        <div class="paletteBtn" onclick="addWidget('clock')"><span class="paletteIcon">&#128336;</span>Clock</div>
        <div class="paletteBtn" onclick="addWidget('calendar')"><span class="paletteIcon">&#128197;</span>Calendar</div>
        <div class="paletteBtn" onclick="addWidget('countdown')"><span class="paletteIcon">&#9203;</span>Countdown</div>
        <div class="paletteBtn" onclick="addWidget('image')"><span class="paletteIcon">&#128248;</span>Image</div>
        <div class="paletteBtn" onclick="addWidget('timer')"><span class="paletteIcon">&#9203;</span>Timer</div>
        <div class="paletteBtn" onclick="addWidget('list')"><span class="paletteIcon">&#128203;</span>List</div>
        <div class="paletteBtn" onclick="addWidget('text')" style="grid-column: 1 / -1;"><span class="paletteIcon">T</span>Text</div>
      </div>
    </div>

    <div>
      <div class="sectionLabel">Canvas Size</div>
      <div class="sizeInputs">
        <input type="number" id="canvasW" value="1920" min="400" max="3840">
        <span>×</span>
        <input type="number" id="canvasH" value="1080" min="300" max="2160">
        <button class="smallBtn" onclick="applyCanvasSize()">Apply</button>
      </div>
    </div>

    <div>
      <div class="sectionLabel">Background</div>
      <div class="bgToggle">
        <button class="smallBtn active" id="bgColorBtn" onclick="setBgMode('color')">Color</button>
        <button class="smallBtn" id="bgImgBtn" onclick="setBgMode('image')">Image</button>
      </div>
      <div class="bgOption" id="bgColorOpt">
        <input type="color" id="bgColorPicker" value="#111111" onchange="setBgColor(this.value)">
        <span style="font-size:12px;color:#888;">Pick color</span>
      </div>
      <div class="bgOption" id="bgImgOpt" style="display:none;">
        <input type="file" id="bgFileInput" accept="image/*" onchange="uploadBgImage(this.files[0])">
        <div id="bgUploadStatus" style="font-size:11px;color:#aaa;margin-top:4px;min-height:16px;"></div>
      </div>
    </div>

    <div>
      <div class="sectionLabel">Layers</div>
      <div id="layerList"></div>
    </div>

    <div class="saveArea">
      <button id="saveBtn" onclick="saveLayout()">Save Layout</button>
      <div id="saveStatus"></div>
    </div>
  </div>

  <div id="mainArea">
    <div id="canvasWrapper">
      <div id="editorCanvas"></div>
    </div>
  </div>

  <div id="configModal">
    <div id="configPanel">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;">
        <h2 id="configTitle" style="margin:0;font-size:20px;"></h2>
        <button class="configClose" onclick="closeConfig()">&#10005;</button>
      </div>
      <div id="configFields"></div>
      <div class="configFooter">
        <button class="configCancel" onclick="closeConfig()">Cancel</button>
        <button class="configApply" onclick="applyConfig()">Apply</button>
      </div>
    </div>
  </div>

  <script>
function loadGoogleFont(family) {
  if (!family || family === 'Bebas Neue' || family === 'IBM Plex Mono' || family === 'Inter') return;
  var id = 'gf-' + family.replace(/[^a-zA-Z0-9]/g, '-');
  if (document.getElementById(id)) return;
  var link = document.createElement('link');
  link.id = id;
  link.rel = 'stylesheet';
  link.href = 'https://fonts.googleapis.com/css2?family=' + encodeURIComponent(family) + ':wght@300;400;600;700&display=swap';
  document.head.appendChild(link);
}

function wallPctDisplay(el) { el.nextElementSibling.textContent = Math.round(el.value * 100) + '%'; }

    let layout = { canvas: {width:1920, height:1080}, background: {type:'color', value:'#111111'}, widgets: [] };
let selectedId = null;
let configWidgetId = null;
let configDraft = {};
let bgMode = 'color';

function hexAlpha(hex, alpha) {
  var r = parseInt((hex||'#ffffff').slice(1,3)||'ff',16);
  var g = parseInt((hex||'#ffffff').slice(3,5)||'ff',16);
  var b = parseInt((hex||'#ffffff').slice(5,7)||'ff',16);
  return 'rgba('+r+','+g+','+b+','+alpha+')';
}

function drawPieCanvas(ctx, size, progress, remaining, cfg) {
  ctx.clearRect(0, 0, size, size);
  var cx = size/2, cy = size/2, r = size/2 - 4;
  var top = -Math.PI/2, tau = 2*Math.PI;
  // empty slice
  ctx.beginPath(); ctx.moveTo(cx,cy);
  ctx.arc(cx,cy,r, top + progress*tau, top + tau);
  ctx.closePath();
  ctx.fillStyle = hexAlpha(cfg.emptyColor||'#ffffff', cfg.emptyAlpha!==undefined ? parseFloat(cfg.emptyAlpha) : 0.15);
  ctx.fill();
  // filled slice
  if (progress > 0.001) {
    ctx.beginPath(); ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,r, top, top + progress*tau);
    ctx.closePath();
    ctx.fillStyle = hexAlpha(cfg.fillColor||'#ff6b6b', cfg.fillAlpha!==undefined ? parseFloat(cfg.fillAlpha) : 0.8);
    ctx.fill();
  }
  // center time text
  if (cfg.showTime !== false && remaining >= 0) {
    var hrs = Math.floor(remaining/3600000);
    var mins = Math.floor((remaining%3600000)/60000);
    var secs = Math.floor((remaining%60000)/1000);
    var showSec = cfg.showSeconds !== false;
    var t = hrs>0 ? hrs+':'+String(mins).padStart(2,'0')+(showSec?':'+String(secs).padStart(2,'0'):'') : mins+':'+String(secs).padStart(2,'0');
    ctx.font = 'bold '+Math.round(size*0.14)+'px "IBM Plex Mono",monospace';
    ctx.fillStyle = cfg.textColor||'#ffffff';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(t, cx, cy);
  }
}

function getScale() {
  const mainArea = document.getElementById('mainArea');
  const mainW = mainArea.clientWidth - 48;
  const mainH = mainArea.clientHeight - 48;
  return Math.min(mainW / layout.canvas.width, mainH / layout.canvas.height, 1);
}

function applyScale() {
  const scale = getScale();
  const canvas = document.getElementById('editorCanvas');
  canvas.style.transform = 'scale(' + scale + ')';
  canvas.style.transformOrigin = 'top left';
  const wrapper = document.getElementById('canvasWrapper');
  wrapper.style.width = (layout.canvas.width * scale) + 'px';
  wrapper.style.height = (layout.canvas.height * scale) + 'px';
}

function renderEditor() {
  document.querySelectorAll('.edWidget').forEach(function(el) {
     if (el.dataset.clockIv) clearInterval(parseInt(el.dataset.clockIv));
     if (el.dataset.cdIv) clearInterval(parseInt(el.dataset.cdIv));
     if (el.dataset.calIv) clearInterval(parseInt(el.dataset.calIv));
     if (el.dataset.timerIv) clearInterval(parseInt(el.dataset.timerIv));
if (el.dataset.timerIv) clearInterval(parseInt(el.dataset.timerIv));
      if (el.dataset.listIv) clearInterval(parseInt(el.dataset.listIv));
    });
  const canvas = document.getElementById('editorCanvas');
  canvas.innerHTML = '';
  canvas.style.width = layout.canvas.width + 'px';
  canvas.style.height = layout.canvas.height + 'px';
  canvas.style.position = 'relative';

  if (layout.background && layout.background.type === 'color') {
    canvas.style.backgroundImage = '';
    canvas.style.backgroundColor = layout.background.value;
  } else if (layout.background && layout.background.type === 'image') {
    canvas.style.backgroundColor = '#000';
    canvas.style.backgroundImage = "url('" + layout.background.value + "')";
    canvas.style.backgroundSize = 'cover';
    canvas.style.backgroundPosition = 'center';
    canvas.style.backgroundRepeat = 'no-repeat';
  } else {
    canvas.style.backgroundImage = '';
    canvas.style.backgroundColor = '#111';
  }

  layout.widgets.forEach(function(w) {
    const el = makeEditorWidget(w);
    canvas.appendChild(el);
  });

  applyScale();
  setupInteract();
  refreshLayerList();
}

function makeEditorWidget(w) {
  const el = document.createElement('div');
  el.className = 'edWidget widget widget-' + w.type + (w.id === selectedId ? ' selected' : '');
  el.dataset.id = w.id;
  el.dataset.x = w.x;
  el.dataset.y = w.y;
  el.style.left = w.x + 'px';
  el.style.top = w.y + 'px';
  el.style.width = w.width + 'px';
  el.style.height = w.height + 'px';

const icons = {clock:'\uD83D\uDD50', calendar:'\uD83D\uDCC5', countdown:'\u23F3', image:'\uD83D\uDDBC\uFE0F', text:'T', timer:'⏱', list:'\uD83D\uDCCB'};
   const labels = {clock:'Clock', calendar:'Calendar', countdown:'Countdown', image:'Image', text:'Text', timer:'Timer', list:'List'};
  const header = document.createElement('div');
  header.className = 'edWidgetHeader';
  header.innerHTML =
    '<span class="edWidgetLabel">' + (icons[w.type]||'') + ' ' + (labels[w.type]||w.type) + '</span>' +
    '<button class="edWidgetConfig" title="Configure">\u2699\uFE0F</button>' +
    '<button class="edWidgetDelete" title="Delete">\u2715</button>';
  header.querySelector('.edWidgetConfig').addEventListener('click', function(e) {
    e.stopPropagation(); openConfig(w.id);
  });
  header.querySelector('.edWidgetDelete').addEventListener('click', function(e) {
    e.stopPropagation(); deleteWidget(w.id);
  });
  switch (w.type) {
    case 'clock':     initClockWidget(el, w); break;
    case 'text':      initTextWidget(el, w); break;
    case 'countdown': initCountdownWidget(el, w); break;
    case 'image':     initImageWidget(el, w); break;
    case 'calendar':  initCalendarWidget(el, w); break;
    case 'timer':     initTimerWidget(el, w); break;
    case 'list':    initListWidget(el, w); break;
  }

  el.appendChild(header);

  el.addEventListener('click', function() { selectWidget(w.id); });
  return el;
}

function initClockWidget(el, w) {
   const cfg = w.config || {};
   const fontSize = cfg.fontSize || 80;
   const color = cfg.color || '#ffffff';
   const fontFamily = cfg.fontFamily || 'Bebas Neue';
   loadGoogleFont(fontFamily);
   const use24h = cfg.format === '24h';
   const timezone = cfg.timezone || Intl.DateTimeFormat().resolvedOptions().timeZone;
   const showDate = cfg.showDate !== false;
   const showSeconds = cfg.showSeconds !== false;

   el.style.flexDirection = 'column';
   const timeEl = document.createElement('div');
   timeEl.className = 'clockTime';
   timeEl.style.cssText = 'font-size:' + fontSize + 'px;color:' + color + ";font-family:'" + fontFamily + "',sans-serif;line-height:1;letter-spacing:2px;";

   const dateEl = document.createElement('div');
   dateEl.className = 'clockDate';
   dateEl.style.cssText = 'font-size:' + Math.round(fontSize * 0.3) + 'px;color:' + color + ";opacity:0.7;font-family:'IBM Plex Mono',monospace;margin-top:4px;";

   el.appendChild(timeEl);
   if (showDate) el.appendChild(dateEl);

   function tick() {
     const now = new Date();
     const opts = { hour: '2-digit', minute: '2-digit', ...(showSeconds ? {second: '2-digit'} : {}), hour12: !use24h, timeZone: timezone };
     timeEl.textContent = now.toLocaleTimeString('en-US', opts);
     if (showDate) {
       const dOpts = { weekday: 'long', month: 'long', day: 'numeric', timeZone: timezone };
       dateEl.textContent = now.toLocaleDateString('en-US', dOpts);
     }
   }
   tick();
   el.dataset.clockIv = setInterval(tick, 1000);
 }

function initTextWidget(el, w) {
   const cfg = w.config || {};
   loadGoogleFont(cfg.fontFamily || 'Inter');
   const justify = cfg.textAlign === 'right' ? 'flex-end' : cfg.textAlign === 'center' ? 'center' : 'flex-start';
   el.style.cssText += 'font-size:' + (cfg.fontSize || 32) + 'px;color:' + (cfg.color || '#ffffff') + ";font-family:'" + (cfg.fontFamily || 'Inter') + "',sans-serif;font-weight:" + (cfg.bold ? '700' : '400') + ";font-style:" + (cfg.italic ? 'italic' : 'normal') + ";justify-content:" + justify + ";padding:12px;white-space:pre-wrap;word-break:break-word;";
  var textNode = document.createElement('div');
  textNode.style.cssText = 'flex:1;overflow:hidden;';
  textNode.textContent = cfg.text || '';
  el.appendChild(textNode);
}

function initCountdownWidget(el, w) {
  var cfg = w.config || {};
  var display = cfg.display || 'text';

  if (display === 'pie') {
    // Pie display — progress based on targetDate + configuredAt
    el.style.flexDirection = 'column';
    el.style.alignItems = 'center';
    el.style.justifyContent = 'center';
    el.style.gap = '8px';
    if (cfg.label) {
      var lbl = document.createElement('div');
      lbl.style.cssText = 'font-size:'+Math.round(w.height*0.05)+'px;color:'+(cfg.textColor||'#ffffff')+';opacity:0.7;font-family:"IBM Plex Mono",monospace;text-transform:uppercase;letter-spacing:2px;text-align:center;';
      lbl.textContent = cfg.label;
      el.appendChild(lbl);
    }
    var pad = cfg.label ? 0.1 : 0.05;
    var size = Math.round(Math.min(w.width, w.height)*(1-pad*2));
    var canvas = document.createElement('canvas');
    canvas.width = size; canvas.height = size;
    canvas.style.width = size+'px'; canvas.style.height = size+'px';
    el.appendChild(canvas);
    var ctx = canvas.getContext('2d');
    var targetMs = cfg.targetDate ? new Date(cfg.targetDate).getTime() : 0;
    var configuredAt = cfg.configuredAt ? parseInt(cfg.configuredAt) : (targetMs ? Date.now() : 0);
    var totalMs = targetMs && configuredAt ? Math.max(1, targetMs - configuredAt) : 1;
    function drawCd() {
      var now = Date.now();
      var remaining = targetMs ? Math.max(0, targetMs - now) : 0;
      var progress = targetMs ? Math.max(0, Math.min(1, 1 - remaining/totalMs)) : 0;
      drawPieCanvas(ctx, size, progress, remaining, cfg);
    }
    drawCd();
    el.dataset.cdIv = setInterval(drawCd, 1000);

} else {
     // Text display (original behavior)
     var fontSize = cfg.fontSize || 60;
     var color = cfg.color || '#ffffff';
     var accentColor = cfg.accentColor || 'var(--color1, #ff6b6b)';
     var fontFamily = cfg.fontFamily || 'Bebas Neue';
     loadGoogleFont(fontFamily);
     var targetDate = cfg.targetDate ? new Date(cfg.targetDate) : null;
     var label = cfg.label || 'Countdown';
     var showSeconds = cfg.showSeconds !== false;
     if (label) {
       var lblEl = document.createElement('div');
       lblEl.className = 'cdLabel';
       lblEl.style.cssText = 'font-size:'+Math.round(fontSize*0.35)+'px;color:'+accentColor+';font-family:\'IBM Plex Mono\',monospace;text-transform:uppercase;letter-spacing:3px;margin-bottom:8px;';
       lblEl.textContent = label;
       el.appendChild(lblEl);
     }
     var timeEl = document.createElement('div');
     timeEl.className = 'cdTime';
     timeEl.style.cssText = 'font-size:'+fontSize+'px;color:'+color+';font-family:\''+fontFamily+'\',sans-serif;letter-spacing:4px;';
     el.appendChild(timeEl);
     var subEl = document.createElement('div');
     subEl.className = 'cdSub';
     subEl.style.cssText = 'font-size:'+Math.round(fontSize*0.25)+'px;color:'+color+';opacity:0.6;font-family:\'IBM Plex Mono\',monospace;margin-top:4px;';
     el.appendChild(subEl);
    function tickCd() {
      if (!targetDate) { timeEl.textContent = '--'; return; }
      var diff = targetDate - new Date();
      if (diff <= 0) { timeEl.textContent = '0d 0h 0m'; subEl.textContent = 'Arrived!'; return; }
      var days = Math.floor(diff/86400000);
      var hours = Math.floor((diff%86400000)/3600000);
      var mins = Math.floor((diff%3600000)/60000);
      var secs = Math.floor((diff%60000)/1000);
      if (days > 0) {
        timeEl.textContent = showSeconds ? days+'d '+hours+'h '+mins+'m '+secs+'s' : days+'d '+hours+'h '+mins+'m';
        subEl.textContent = targetDate.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
      } else {
        timeEl.textContent = showSeconds ? hours+':'+String(mins).padStart(2,'0')+':'+String(secs).padStart(2,'0') : hours+'h '+mins+'m';
        subEl.textContent = 'Today!';
      }
    }
    tickCd();
    el.dataset.cdIv = setInterval(tickCd, 1000);
  }
  // future display types: 'arc', 'bar', etc.
}

function initImageWidget(el, w) {

function initCalendarWidget(el, w) {
   var cfg = w.config || {};
   var fontSize = parseFloat(cfg.fontSize) || 18;
   var textColor = cfg.textColor || '#ffffff';
   var accentColor = cfg.accentColor || '#6bceff';
   var fontFamily = cfg.fontFamily || 'Inter';
   loadGoogleFont(fontFamily);
   var icsUrl = cfg.icsUrl || '';
   var view = cfg.view || 'next-days';
   var weekStartsOn = cfg.weekStartsOn === 'mon' ? 1 : 0;  // 0=Sun,1=Mon
   var eventCount = parseInt(cfg.eventCount) || 3;
   var wrapText = cfg.wrapText === true;
   var noWrap = wrapText
     ? 'overflow:hidden;word-break:break-word;white-space:normal;'
     : 'overflow:hidden;text-overflow:ellipsis;white-space:nowrap;';

  el.style.cssText += 'padding:12px;overflow:hidden;box-sizing:border-box;';

  // Optional title header
  if (cfg.title) {
    var hdr = document.createElement('div');
    hdr.style.cssText = 'font-size:' + Math.round(fontSize * 0.75) + 'px;color:' + accentColor + ";font-family:'IBM Plex Mono',monospace;text-transform:uppercase;letter-spacing:3px;margin-bottom:10px;flex-shrink:0;";
    hdr.textContent = cfg.title;
    el.appendChild(hdr);
  }

  // Content container (fills remaining space)
  var body = document.createElement('div');
  body.style.cssText = 'flex:1;overflow:hidden;min-height:0;display:flex;flex-direction:column;';
  el.appendChild(body);

  // ---- Helpers ----

  function isoToLocal(isoStr) {
    if (isoStr && /^\d{4}-\d{2}-\d{2}$/.test(isoStr)) {
      var p = isoStr.split('-');
      return new Date(+p[0], +p[1]-1, +p[2]);
    }
    return new Date(isoStr);
  }

  function startOfDay(d) {
    var r = new Date(d);
    r.setHours(0, 0, 0, 0);
    return r;
  }

  function dayKey(d) {
    // 'YYYY-MM-DD' in local time
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  }

  function sameDay(a, b) { return dayKey(a) === dayKey(b); }

  function fmtTime(d) {
    return d.toLocaleTimeString('en-US', {hour:'numeric', minute:'2-digit', hour12:true});
  }

  function fmtDate(d, opts) {
    return d.toLocaleDateString('en-US', opts);
  }

  var DAY_SHORT = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  var DAY_LONG  = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  var MON_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  function eventsForDay(events, d) {
    var k = dayKey(d);
    return events.filter(function(ev) {
      return dayKey(isoToLocal(ev.start)) === k;
    });
  }

  function groupByDay(events, fromDate, toDate) {
    // Returns array of {date, events[]} for each day in [fromDate, toDate]
    var days = [];
    var cur = startOfDay(fromDate);
    var end = startOfDay(toDate);
    while (cur <= end) {
      var evs = eventsForDay(events, cur);
      if (evs.length) days.push({date: new Date(cur), events: evs});
      cur = new Date(cur.getTime() + 86400000);
    }
    return days;
  }

  // ---- View renderers ----

  function renderError(msg) {
    body.innerHTML = '';
    var d = document.createElement('div');
    d.style.cssText = 'font-size:' + fontSize + 'px;color:' + textColor + ';opacity:0.4;padding:8px;';
    d.textContent = msg;
    body.appendChild(d);
  }

  function renderAgenda(events) {
    body.innerHTML = '';
    var today = new Date();
    var todayEvs = eventsForDay(events, today);
    var allDayEvs = todayEvs.filter(function(e){ return e.allDay; });
    var timedEvs  = todayEvs.filter(function(e){ return !e.allDay; });

    // Date header
    var dateHdr = document.createElement('div');
    dateHdr.style.cssText = 'font-size:' + Math.round(fontSize*1.1) + 'px;color:' + accentColor + ";font-family:'IBM Plex Mono',monospace;margin-bottom:10px;flex-shrink:0;";
    dateHdr.textContent = fmtDate(today, {weekday:'long', month:'long', day:'numeric'});
    body.appendChild(dateHdr);

    if (!todayEvs.length) {
      var empty = document.createElement('div');
      empty.style.cssText = 'font-size:' + fontSize + 'px;color:' + textColor + ';opacity:0.35;';
      empty.textContent = 'Nothing today';
      body.appendChild(empty);
      return;
    }

    // All-day events
    allDayEvs.forEach(function(ev) {
      var row = document.createElement('div');
      row.style.cssText = 'display:flex;gap:10px;align-items:baseline;margin-bottom:6px;';
      var t = document.createElement('div');
      t.style.cssText = 'font-size:' + Math.round(fontSize*0.75) + 'px;color:' + accentColor + ";font-family:'IBM Plex Mono',monospace;flex-shrink:0;min-width:70px;";
t.textContent = 'All Day';
       var n = document.createElement('div');
n.style.cssText = 'font-size:' + fontSize + 'px;color:' + textColor + ";font-family:'"+fontFamily+"',sans-serif;" + noWrap;
        n.textContent = ev.summary;
        row.appendChild(t); row.appendChild(n);
        body.appendChild(row);
      });

     // Timed events
     timedEvs.forEach(function(ev) {
       var row = document.createElement('div');
       row.style.cssText = 'display:flex;gap:10px;align-items:baseline;margin-bottom:6px;';
       var t = document.createElement('div');
       t.style.cssText = 'font-size:' + Math.round(fontSize*0.75) + 'px;color:' + accentColor + ";font-family:'IBM Plex Mono',monospace;flex-shrink:0;min-width:70px;";
       t.textContent = fmtTime(isoToLocal(ev.start));
       var n = document.createElement('div');
       n.style.cssText = 'font-size:' + fontSize + 'px;color:' + textColor + ";font-family:'"+fontFamily+"',sans-serif;" + noWrap;
       n.textContent = ev.summary;
      row.appendChild(t); row.appendChild(n);
      body.appendChild(row);
    });
  }

  function renderListDays(events, fromDate, toDate, label) {
    body.innerHTML = '';
    var groups = groupByDay(events, fromDate, toDate);
    if (!groups.length) { renderError('No events'); return; }

    var scroll = document.createElement('div');
    scroll.style.cssText = 'overflow:hidden;flex:1;display:flex;flex-direction:column;gap:14px;';
    body.appendChild(scroll);

    groups.forEach(function(g) {
      var section = document.createElement('div');
      var today = new Date();

      var dayHdr = document.createElement('div');
      dayHdr.style.cssText = 'font-size:' + Math.round(fontSize*0.8) + 'px;color:' + accentColor + ";font-family:'IBM Plex Mono',monospace;text-transform:uppercase;letter-spacing:2px;margin-bottom:4px;border-bottom:1px solid " + accentColor + '33;padding-bottom:4px;';
      var isToday = sameDay(g.date, today);
      dayHdr.textContent = isToday
        ? 'Today — ' + fmtDate(g.date, {month:'short', day:'numeric'})
        : DAY_LONG[g.date.getDay()] + ', ' + fmtDate(g.date, {month:'short', day:'numeric'});
      section.appendChild(dayHdr);

      g.events.forEach(function(ev) {
        var row = document.createElement('div');
        row.style.cssText = 'display:flex;gap:10px;align-items:baseline;padding:2px 0;';
        var t = document.createElement('div');
        t.style.cssText = 'font-size:' + Math.round(fontSize*0.75) + 'px;color:' + accentColor + ";font-family:'IBM Plex Mono',monospace;flex-shrink:0;min-width:70px;";
        t.textContent = ev.allDay ? 'All Day' : fmtTime(isoToLocal(ev.start));
        var n = document.createElement('div');
        n.style.cssText = 'font-size:' + fontSize + 'px;color:' + textColor + ";font-family:'"+fontFamily+"',sans-serif;" + noWrap;
        n.textContent = ev.summary;
        row.appendChild(t); row.appendChild(n);
        section.appendChild(row);
      });

      scroll.appendChild(section);
    });
  }

  function renderWeek(events) {
    body.innerHTML = '';
    var today = new Date();
    // Compute week start
    var dow = today.getDay(); // 0=Sun
    var diff = (dow - weekStartsOn + 7) % 7;
    var weekStart = startOfDay(new Date(today.getTime() - diff * 86400000));

    // Column headers row
    var headerRow = document.createElement('div');
    headerRow.style.cssText = 'display:flex;gap:4px;margin-bottom:6px;flex-shrink:0;';
    body.appendChild(headerRow);

    // Columns container
    var colRow = document.createElement('div');
    colRow.style.cssText = 'display:flex;gap:4px;flex:1;overflow:hidden;';
    body.appendChild(colRow);

    for (var i = 0; i < 7; i++) {
      var colDate = new Date(weekStart.getTime() + i * 86400000);
      var isToday = sameDay(colDate, today);

      // Header cell
      var hc = document.createElement('div');
      hc.style.cssText = 'flex:1;text-align:center;font-size:' + Math.round(fontSize*0.75) + 'px;font-family:\'IBM Plex Mono\',monospace;padding:4px 2px;border-radius:4px 4px 0 0;background:' + (isToday ? accentColor+'33' : 'rgba(255,255,255,0.05)') + ';color:' + (isToday ? accentColor : textColor) + ';';
      hc.innerHTML = DAY_SHORT[colDate.getDay()] + '<br><span style="font-size:' + Math.round(fontSize*1.1) + 'px;font-weight:600;">' + colDate.getDate() + '</span>';
      headerRow.appendChild(hc);

      // Event column
      var col = document.createElement('div');
      col.style.cssText = 'flex:1;overflow:hidden;display:flex;flex-direction:column;gap:3px;padding:4px 2px;background:' + (isToday ? accentColor+'18' : 'transparent') + ';border-radius:0 0 4px 4px;';

      var dayEvs = eventsForDay(events, colDate);
      dayEvs.forEach(function(ev) {
        var chip = document.createElement('div');
        chip.style.cssText = 'font-size:' + Math.round(fontSize*0.7) + 'px;color:' + textColor + ";font-family:'"+fontFamily+"',sans-serif;background:rgba(255,255,255,0.1);border-radius:3px;padding:2px 4px;" + noWrap + 'border-left:2px solid ' + accentColor + ';';
        chip.title = ev.summary;
        chip.textContent = ev.allDay ? ev.summary : fmtTime(isoToLocal(ev.start)) + ' ' + ev.summary;
        col.appendChild(chip);
      });

      colRow.appendChild(col);
    }
  }

  function renderMonth(events) {
    body.innerHTML = '';
    var today = new Date();
    var year = today.getFullYear();
    var month = today.getMonth();

    // Month + year header
    var mhdr = document.createElement('div');
    mhdr.style.cssText = 'font-size:' + Math.round(fontSize*0.9) + 'px;color:' + accentColor + ";font-family:'IBM Plex Mono',monospace;text-transform:uppercase;letter-spacing:2px;margin-bottom:8px;flex-shrink:0;";
    mhdr.textContent = MON_SHORT[month] + ' ' + year;
    body.appendChild(mhdr);

    // Day-of-week header row
    var dowRow = document.createElement('div');
    dowRow.style.cssText = 'display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:2px;flex-shrink:0;';
    for (var i = 0; i < 7; i++) {
      var d = (i + weekStartsOn) % 7;
      var dh = document.createElement('div');
      dh.style.cssText = 'text-align:center;font-size:' + Math.round(fontSize*0.65) + 'px;color:' + textColor + ";opacity:0.5;font-family:'IBM Plex Mono',monospace;";
      dh.textContent = DAY_SHORT[d];
      dowRow.appendChild(dh);
    }
    body.appendChild(dowRow);

    // Grid
    var grid = document.createElement('div');
    grid.style.cssText = 'display:grid;grid-template-columns:repeat(7,1fr);gap:2px;flex:1;overflow:hidden;';
    body.appendChild(grid);

    // First day of month
    var firstDay = new Date(year, month, 1);
    var startDow = firstDay.getDay();
    var startOffset = (startDow - weekStartsOn + 7) % 7;

    // Total cells: 6 rows × 7
    var totalCells = 42;
    for (var ci = 0; ci < totalCells; ci++) {
      var cellDate = new Date(year, month, 1 - startOffset + ci);
      var inMonth = cellDate.getMonth() === month && cellDate.getFullYear() === year;
      var isTodayCell = sameDay(cellDate, today);

      var cell = document.createElement('div');
      cell.style.cssText = 'display:flex;flex-direction:column;overflow:hidden;padding:2px 3px;border-radius:3px;background:' +
        (isTodayCell ? accentColor + '22' : inMonth ? 'rgba(255,255,255,0.04)' : 'transparent') + ';';

      var dayNum = document.createElement('div');
      dayNum.style.cssText = 'font-size:' + Math.round(fontSize*0.75) + 'px;font-family:\'IBM Plex Mono\',monospace;color:' +
        (isTodayCell ? accentColor : inMonth ? textColor : textColor + '55') +
        (isTodayCell ? ';font-weight:700;' : ';opacity:' + (inMonth ? '0.9' : '0.3') + ';');
      dayNum.textContent = cellDate.getDate();
      cell.appendChild(dayNum);

      if (inMonth || !inMonth) {  // show events for all visible days
        var cellEvs = eventsForDay(events, cellDate);
        var shown = 0;
        cellEvs.forEach(function(ev) {
          if (shown >= eventCount) return;
          var evEl = document.createElement('div');
          evEl.style.cssText = 'font-size:' + Math.round(fontSize*0.58) + 'px;color:' + textColor + ";font-family:'"+fontFamily+"',sans-serif;background:" + accentColor + '33;border-radius:2px;padding:1px 3px;' + noWrap + 'margin-top:1px;';
          evEl.title = ev.summary;
          evEl.textContent = ev.summary;
          cell.appendChild(evEl);
          shown++;
        });
        if (cellEvs.length > eventCount) {
          var more = document.createElement('div');
          more.style.cssText = 'font-size:' + Math.round(fontSize*0.55) + 'px;color:' + accentColor + ';opacity:0.7;margin-top:1px;';
          more.textContent = '+' + (cellEvs.length - eventCount) + ' more';
          cell.appendChild(more);
        }
      }

      grid.appendChild(cell);
    }
  }

  // ---- Main refresh ----

  function renderMonthName() {
    body.innerHTML = '';
    var now = new Date();
    var wrap = document.createElement('div');
    wrap.style.cssText = 'flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;';
    var mn = document.createElement('div');
    mn.style.cssText = 'font-size:' + Math.round(w.height * 0.38) + 'px;color:' + textColor + ";font-family:'" + fontFamily + "',sans-serif;line-height:1;";
    mn.textContent = now.toLocaleDateString('en-US', {month:'long'});
    wrap.appendChild(mn);
    var yr = document.createElement('div');
    yr.style.cssText = 'font-size:' + Math.round(w.height * 0.1) + 'px;color:' + accentColor + ";font-family:'IBM Plex Mono',monospace;opacity:0.6;margin-top:10px;letter-spacing:4px;";
    yr.textContent = now.getFullYear();
    wrap.appendChild(yr);
    body.appendChild(wrap);
  }

  async function refresh() {
    if (view === 'month-name') { renderMonthName(); return; }
    if (!icsUrl) { body.innerHTML = ''; return; }
    var events;
    try {
      var resp = await fetch('/wall/ics?url=' + encodeURIComponent(icsUrl));
      events = await resp.json();
    } catch(e) {
      renderError('Calendar unavailable');
      return;
    }

    var now = new Date();
    if (view === 'agenda') {
      renderAgenda(events);
    } else if (view === 'next-days') {
      var days = parseInt(cfg.nextDays) || 7;
      var from = startOfDay(now);
      var to = new Date(from.getTime() + (days - 1) * 86400000);
      renderListDays(events, from, to);
    } else if (view === 'next-weeks') {
      var weeks = parseInt(cfg.nextWeeks) || 2;
      var from = startOfDay(now);
      var to = new Date(from.getTime() + weeks * 7 * 86400000 - 86400000);
      renderListDays(events, from, to);
    } else if (view === 'this-week') {
      renderWeek(events);
    } else if (view === 'this-month') {
      renderMonth(events);
    }
  }

  refresh();
  // In wall.html:  calendarTimers.push(setInterval(refresh, 900000));
  // In wall-edit.html: el.dataset.calIv = setInterval(refresh, 900000);
}

function initTimerWidget(el, w) {
    var cfg = w.config || {};
    var display = cfg.display || 'pie';
    var durationMs = (parseFloat(cfg.durationMinutes)||60)*60000;
    var startedAt = cfg.startedAt ? parseInt(cfg.startedAt) : 0;

    if (display === 'text') {
      // Text display — mirrors countdown text style
      var fontSize = cfg.fontSize || 60;
      var color = cfg.textColor || '#ffffff';
      var accentColor = cfg.fillColor || 'var(--color1, #ff6b6b)';
      var fontFamily = cfg.fontFamily || 'Bebas Neue';
      loadGoogleFont(fontFamily);
      var label = cfg.label || '';
      var showSeconds = cfg.showTime !== false;
      if (label) {
        var lblEl2 = document.createElement('div');
        lblEl2.className = 'cdLabel';
        lblEl2.style.cssText = 'font-size:'+Math.round(fontSize*0.35)+'px;color:'+accentColor+';font-family:\'IBM Plex Mono\',monospace;text-transform:uppercase;letter-spacing:3px;margin-bottom:8px;';
        lblEl2.textContent = label;
        el.appendChild(lblEl2);
      }
      var timeEl2 = document.createElement('div');
      timeEl2.className = 'cdTime';
      timeEl2.style.cssText = 'font-size:'+fontSize+'px;color:'+color+';font-family:\''+fontFamily+'\',sans-serif;letter-spacing:4px;';
      el.appendChild(timeEl2);
      var subEl2 = document.createElement('div');
      subEl2.className = 'cdSub';
      subEl2.style.cssText = 'font-size:'+Math.round(fontSize*0.25)+'px;color:'+color+';opacity:0.6;font-family:\'IBM Plex Mono\',monospace;margin-top:4px;';
      el.appendChild(subEl2);
      function tickTm() {
        var remaining = startedAt ? Math.max(0, (startedAt + durationMs) - Date.now()) : durationMs;
        if (remaining <= 0) { timeEl2.textContent = 'Done!'; subEl2.textContent = ''; return; }
        var hrs = Math.floor(remaining/3600000);
        var mins2 = Math.floor((remaining%3600000)/60000);
        var secs2 = Math.floor((remaining%60000)/1000);
        timeEl2.textContent = showSeconds
          ? (hrs>0 ? hrs+':'+String(mins2).padStart(2,'0')+':'+String(secs2).padStart(2,'0') : mins2+':'+String(secs2).padStart(2,'0'))
          : (hrs>0 ? hrs+'h '+mins2+'m' : mins2+'m');
        subEl2.textContent = startedAt ? 'Started '+new Date(startedAt).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}) : '';
      }
      tickTm();
      el.dataset.timerIv = setInterval(tickTm, 1000);

    } else {
      // Pie display (original behavior)
      el.style.flexDirection = 'column';
      el.style.alignItems = 'center';
      el.style.justifyContent = 'center';
      el.style.gap = '8px';
      if (cfg.label) {
        var lbl2 = document.createElement('div');
        lbl2.style.cssText = 'font-size:'+Math.round(w.height*0.05)+'px;color:'+(cfg.textColor||'#ffffff')+';opacity:0.7;font-family:"IBM Plex Mono",monospace;text-transform:uppercase;letter-spacing:2px;text-align:center;';
        lbl2.textContent = cfg.label;
        el.appendChild(lbl2);
      }
      var pad2 = cfg.label ? 0.1 : 0.05;
      var size2 = Math.round(Math.min(w.width,w.height)*(1-pad2*2));
      var canvas2 = document.createElement('canvas');
      canvas2.width = size2; canvas2.height = size2;
      canvas2.style.width = size2+'px'; canvas2.style.height = size2+'px';
      el.appendChild(canvas2);
      var ctx2 = canvas2.getContext('2d');
      function drawTm() {
        var now2 = Date.now();
        var remaining2 = startedAt ? Math.max(0,(startedAt+durationMs)-now2) : durationMs;
        var progress2 = startedAt && durationMs ? Math.max(0,Math.min(1,(now2-startedAt)/durationMs)) : 0;
        drawPieCanvas(ctx2, size2, progress2, remaining2, cfg);
      }
      drawTm();
      el.dataset.timerIv = setInterval(drawTm, 1000);
    }
    // future display types: 'arc', 'bar', etc.
  }

function initListWidget(el, w) {
   var cfg = w.config || {};
   var fontSize = parseFloat(cfg.fontSize) || 18;
   var textColor = cfg.textColor || '#ffffff';
   var accentColor = cfg.accentColor || '#6bceff';
   var fontFamily = cfg.fontFamily || 'Inter';
   loadGoogleFont(fontFamily);
   var source = cfg.source || 'todoist';
  var maxItems = parseInt(cfg.maxItems) || 20;
  var showCompleted = cfg.showCompleted === true;
  var wrapText = cfg.wrapText === true;
  var noWrap = wrapText
    ? 'overflow:hidden;word-break:break-word;white-space:normal;'
    : 'overflow:hidden;text-overflow:ellipsis;white-space:nowrap;';

  el.style.cssText += 'padding:12px;overflow:hidden;box-sizing:border-box;';

  if (cfg.title) {
    var hdr = document.createElement('div');
    hdr.style.cssText = 'font-size:' + Math.round(fontSize * 0.75) + 'px;color:' + accentColor + ";font-family:'IBM Plex Mono',monospace;text-transform:uppercase;letter-spacing:3px;margin-bottom:10px;flex-shrink:0;";
    hdr.textContent = cfg.title;
    el.appendChild(hdr);
  }

  var listEl = document.createElement('div');
  listEl.style.cssText = 'flex:1;overflow:hidden;display:flex;flex-direction:column;gap:4px;';
  el.appendChild(listEl);

  var PRIORITY_COLOR = {'4': accentColor, '3': '#ff9f43', '2': '#ff6b6b', '1': '#ff6b6b'};

  function fmtDue(dueStr) {
    if (!dueStr) return null;
    var d = new Date(dueStr);
    var today = new Date(); today.setHours(0,0,0,0);
    var diff = Math.floor((d - today) / 86400000);
    if (diff < 0) return {text: 'Overdue', overdue: true};
    if (diff === 0) return {text: 'Today', overdue: false};
    if (diff === 1) return {text: 'Tomorrow', overdue: false};
    return {text: d.toLocaleDateString('en-US', {month:'short', day:'numeric'}), overdue: false};
  }

  function renderItems(items) {
    listEl.innerHTML = '';
    if (!items.length) {
      var empty = document.createElement('div');
      empty.style.cssText = 'font-size:' + fontSize + 'px;color:' + textColor + ';opacity:0.35;';
      empty.textContent = 'No items';
      listEl.appendChild(empty);
      return;
    }
    items.forEach(function(item) {
      var completed = item.isCompleted || item.completed || false;
      if (completed && !showCompleted) return;

      var row = document.createElement('div');
      row.style.cssText = 'display:flex;align-items:baseline;gap:8px;padding:2px 0;';

      var check = document.createElement('div');
      check.style.cssText = 'flex-shrink:0;font-size:' + Math.round(fontSize * 0.85) + 'px;color:' +
        (completed ? textColor + '55' : (source === 'todoist' ? (PRIORITY_COLOR[String(item.priority)] || accentColor) : accentColor)) + ';';
      check.textContent = completed ? '\u2713' : '\u2610';
      row.appendChild(check);

      var right = document.createElement('div');
      right.style.cssText = 'flex:1;overflow:hidden;';

      var content = document.createElement('div');
      content.style.cssText = 'font-size:' + fontSize + 'px;color:' + (completed ? textColor + '55' : textColor) + ";font-family:'"+fontFamily+"',sans-serif;" + noWrap + (completed ? 'text-decoration:line-through;' : '');
      content.textContent = item.content;
      right.appendChild(content);

      var due = fmtDue(item.due);
      if (due) {
        var dueEl = document.createElement('div');
        dueEl.style.cssText = 'font-size:' + Math.round(fontSize * 0.65) + 'px;color:' + (due.overdue ? '#ff6b6b' : accentColor) + ";font-family:'IBM Plex Mono',monospace;opacity:0.8;";
        dueEl.textContent = due.text;
        right.appendChild(dueEl);
      }

      row.appendChild(right);
      listEl.appendChild(row);
    });
  }

  function renderError(msg) {
    listEl.innerHTML = '';
    var d = document.createElement('div');
    d.style.cssText = 'font-size:' + fontSize + 'px;color:' + textColor + ';opacity:0.35;';
    d.textContent = msg;
    listEl.appendChild(d);
  }

  async function refresh() {
    try {
      var url, resp, items;
      if (source === 'todoist') {
        var params = new URLSearchParams();
        if (cfg.todoistFilter) params.set('filter', cfg.todoistFilter);
        if (cfg.todoistProject) params.set('project', cfg.todoistProject);
        params.set('limit', String(maxItems));
        resp = await fetch('/wall/list/todoist?' + params.toString());
        items = await resp.json();
      } else {
        var params2 = new URLSearchParams();
        params2.set('file', cfg.obsidianFile || '');
        params2.set('filter', cfg.obsidianFilter || 'incomplete');
        params2.set('limit', String(maxItems));
        resp = await fetch('/wall/list/obsidian?' + params2.toString());
        items = await resp.json();
      }
      renderItems(items);
    } catch(e) {
      renderError('Failed to load');
    }
  }

  refresh();
  el.dataset.listIv = setInterval(refresh, 300000);
}

async function saveLayout() {
  const btn = document.getElementById('saveBtn');
  const status = document.getElementById('saveStatus');
  btn.disabled = true;
  try {
    const resp = await fetch('/wall/layout', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(layout)
    });
    if (resp.ok) {
      status.textContent = '\u2713 Saved!';
      status.style.color = '#4aff6b';
    } else {
      throw new Error('Server error');
    }
  } catch(e) {
    status.textContent = '\u2717 Error saving';
    status.style.color = '#ff4a4a';
  }
  btn.disabled = false;
  setTimeout(function() { status.textContent = ''; }, 3000);
}

async function loadLayout() {
  try {
    const resp = await fetch('/wall/layout');
    const data = await resp.json();
    if (data && data.canvas) layout = data;
  } catch(e) {}
  renderEditor();
}

function refreshLayerList() {
  const list = document.getElementById('layerList');
  if (!list) return;
  list.innerHTML = '';
  const labels = {clock:'Clock', calendar:'Calendar', countdown:'Countdown', image:'Image', text:'Text', timer:'Timer', list:'List'};
  var reversed = layout.widgets.slice().reverse();
  reversed.forEach(function(w) {
    const item = document.createElement('div');
    item.className = 'layerItem' + (w.id === selectedId ? ' selected' : '');
    item.innerHTML =
      '<span class="layerName">' + (labels[w.type]||w.type) + '</span>' +
      '<button onclick="moveLayer(\'' + w.id + '\',-1)" title="Up">\u2191</button>' +
      '<button onclick="moveLayer(\'' + w.id + '\',1)" title="Down">\u2193</button>';
    list.appendChild(item);
  });
}

function moveLayer(id, dir) {
  const idx = layout.widgets.findIndex(function(w) { return w.id === id; });
  if (idx < 0) return;
  const newIdx = idx + dir;
  if (newIdx < 0 || newIdx >= layout.widgets.length) return;
  const tmp = layout.widgets[idx];
  layout.widgets[idx] = layout.widgets[newIdx];
  layout.widgets[newIdx] = tmp;
  renderEditor();
}

function applyCanvasSize() {
  var w = parseInt(document.getElementById('canvasW').value) || 1920;
  var h = parseInt(document.getElementById('canvasH').value) || 1080;
  layout.canvas = { width: w, height: h };
  renderEditor();
}

async function uploadBgImage(file) {
  if (!file) return;
  const statusEl = document.getElementById('bgUploadStatus');
  if (statusEl) statusEl.textContent = 'Uploading\u2026';
  try {
    const fd = new FormData();
    fd.append('file', file);
    const resp = await fetch('/wall/upload', { method: 'POST', body: fd });
    if (!resp.ok) throw new Error('Server error ' + resp.status);
    const data = await resp.json();
    if (!data.url) throw new Error('No URL returned');
    layout.background = { type: 'image', value: data.url };
    if (statusEl) statusEl.textContent = '\u2713 Image set';
    renderEditor();
  } catch(e) {
    if (statusEl) statusEl.textContent = '\u2717 ' + e.message;
    console.error('uploadBgImage:', e);
  }
}

var GRID = 20;

function setupInteract() {
  var scale = getScale();
  interact('.edWidget')
    .draggable({
      listeners: {
        start: function(event) {
          var t = event.target;
          t.dataset.rawX = parseFloat(t.dataset.x) || 0;
          t.dataset.rawY = parseFloat(t.dataset.y) || 0;
        },
        move: function(event) {
          var t = event.target;
          var shifted = event.shiftKey || (event.originalEvent && event.originalEvent.shiftKey);
          var rawX = Math.max(0, (parseFloat(t.dataset.rawX) || 0) + event.dx / scale);
          var rawY = Math.max(0, (parseFloat(t.dataset.rawY) || 0) + event.dy / scale);
          t.dataset.rawX = rawX;
          t.dataset.rawY = rawY;
          var x = shifted ? Math.round(rawX) : Math.round(rawX / GRID) * GRID;
          var y = shifted ? Math.round(rawY) : Math.round(rawY / GRID) * GRID;
          t.style.left = x + 'px';
          t.style.top = y + 'px';
          t.dataset.x = x;
          t.dataset.y = y;
          var widget = findWidget(t.dataset.id);
          if (widget) { widget.x = x; widget.y = y; }
        }
      }
    })
    .resizable({
      edges: { right: true, bottom: true, bottomRight: true },
      listeners: {
        move: function(event) {
          var t = event.target;
          var shifted = event.shiftKey || (event.originalEvent && event.originalEvent.shiftKey);
          var rawW = Math.max(80, event.rect.width / scale);
          var rawH = Math.max(60, event.rect.height / scale);
          var w = shifted ? Math.round(rawW) : Math.max(GRID, Math.round(rawW / GRID) * GRID);
          var h = shifted ? Math.round(rawH) : Math.max(GRID, Math.round(rawH / GRID) * GRID);
          t.style.width = w + 'px';
          t.style.height = h + 'px';
          var widget = findWidget(t.dataset.id);
          if (widget) { widget.width = w; widget.height = h; }
        }
      }
    });
}

  if (!configWidgetId) return;
  const w = findWidget(configWidgetId);
  if (!w) return;
  document.querySelectorAll('#configFields [data-key]').forEach(function(el) {
    const key = el.dataset.key;
    if (el.type === 'checkbox') configDraft[key] = el.checked;
    else if (el.type === 'number') configDraft[key] = parseFloat(el.value) || 0;
    else configDraft[key] = el.value;
  });
  if (w.type === 'timer') {
    configDraft.startedAt = Date.now();
  }
if (w.type === 'countdown' && configDraft.display === 'pie') {
      var cdAtRaw = configDraft.configuredAt;
      if (cdAtRaw && typeof cdAtRaw === 'string' && cdAtRaw.length > 5) {

      } else if (!cdAtRaw || cdAtRaw === '0' || cdAtRaw === 0) {
        configDraft.configuredAt = Date.now();
      }
    }
  w.config = JSON.parse(JSON.stringify(configDraft));
  closeConfig();
  renderEditor();
}

async function handleImgUpload(input) {
  if (!input.files[0]) return;
  const btn = input.previousElementSibling;
  if (btn) btn.textContent = 'Uploading\u2026';
  try {
    const fd = new FormData();
    fd.append('file', input.files[0]);
    const resp = await fetch('/wall/upload', { method: 'POST', body: fd });
    if (!resp.ok) throw new Error('Server error ' + resp.status);
    const data = await resp.json();
    configDraft.src = data.url;
    const srcInp = document.querySelector('#configFields input[data-key="src"]');
    if (srcInp) srcInp.value = data.url;
    let thumb = document.getElementById('imgModalThumb');
    if (!thumb) {
      thumb = document.createElement('img');
      thumb.id = 'imgModalThumb';
      thumb.style.cssText = 'max-width:100%;max-height:120px;object-fit:contain;margin-top:8px;border-radius:4px;';
      if (srcInp) srcInp.parentNode.appendChild(thumb);
    }
    thumb.src = data.url;
    if (btn) btn.textContent = '\u2713 Uploaded';
  } catch(e) {
    if (btn) btn.textContent = '\u2717 Upload failed';
    console.error('handleImgUpload:', e);
  }
}

function getTimezoneOptions(selected) {
  var zones = [
    'America/New_York','America/Chicago','America/Denver','America/Los_Angeles',
    'America/Phoenix','America/Anchorage','Pacific/Honolulu',
    'Europe/London','Europe/Paris','Europe/Berlin','Europe/Moscow',
    'Asia/Tokyo','Asia/Shanghai','Asia/Kolkata','Australia/Sydney',
    'UTC'
  ];
  return zones.map(function(z) {
    return '<option value="' + z + '"' + (z===selected?' selected':'') + '>' + z.replace(/_/g,' ') + '</option>';
  }).join('');
}
