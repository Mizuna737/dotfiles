<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920">
  <title>Wall Display</title>
  <link rel="stylesheet" href="/colors.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;700&family=Inter:wght@300;400;600&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body, html {
      margin: 0;
      padding: 0;
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      background: #111;
    }

    #wallCanvas {
      position: relative;
      width: 1920px;
      height: 1080px;
    }

    .widget {
      position: absolute;
      overflow: hidden;
      box-sizing: border-box;
    }

    .widget-clock {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .widget-text {
      display: flex;
      align-items: center;
    }

    .widget-countdown {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .widget-calendar {
      display: flex;
      flex-direction: column;
      padding: 16px;
      gap: 8px;
    }

    .widget-image {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .widget-timer {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .widget-list {
      display: flex;
      flex-direction: column;
    }

    .calEvent {
      display: flex;
      gap: 12px;
      align-items: baseline;
    }

    .calEventTime {
      flex-shrink: 0;
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <div id="wallCanvas"></div>
  <script>
    let layout = {};
    let clockIntervals = [];
    let countdownIntervals = [];
    let calendarTimers = [];
    let listTimers = [];

    function hexAlpha(hex, alpha) {
      var r = parseInt((hex||'#ffffff').slice(1,3)||'ff',16);
      var g = parseInt((hex||'#ffffff').slice(3,5)||'ff',16);
      var b = parseInt((hex||'#ffffff').slice(5,7)||'ff',16);
      return 'rgba('+r+','+g+','+b+','+alpha+')';
    }

    function drawPieCanvas(ctx, size, progress, remaining, cfg) {
      ctx.clearRect(0, 0, size, size);
      var cx = size/2, cy = size/2, r = size/2 - 4;
      var top = -Math.PI/2, tau = 2*Math.PI;
      // empty slice
      ctx.beginPath(); ctx.moveTo(cx,cy);
      ctx.arc(cx,cy,r, top + progress*tau, top + tau);
      ctx.closePath();
      ctx.fillStyle = hexAlpha(cfg.emptyColor||'#ffffff', cfg.emptyAlpha!==undefined ? parseFloat(cfg.emptyAlpha) : 0.15);
      ctx.fill();
      // filled slice
      if (progress > 0.001) {
        ctx.beginPath(); ctx.moveTo(cx,cy);
        ctx.arc(cx,cy,r, top, top + progress*tau);
        ctx.closePath();
        ctx.fillStyle = hexAlpha(cfg.fillColor||'#ff6b6b', cfg.fillAlpha!==undefined ? parseFloat(cfg.fillAlpha) : 0.8);
        ctx.fill();
      }
      // center time text
      if (cfg.showTime !== false && remaining >= 0) {
        var hrs = Math.floor(remaining/3600000);
        var mins = Math.floor((remaining%3600000)/60000);
        var secs = Math.floor((remaining%60000)/1000);
        var showSec = cfg.showSeconds !== false;
        var t = hrs>0 ? hrs+':'+String(mins).padStart(2,'0')+(showSec?':'+String(secs).padStart(2,'0'):'') : mins+':'+String(secs).padStart(2,'0');
        ctx.font = 'bold '+Math.round(size*0.14)+'px "IBM Plex Mono",monospace';
        ctx.fillStyle = cfg.textColor||'#ffffff';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(t, cx, cy);
      }
    }

    async function init() {
      await loadLayout();
      connectSSE();
    }

    async function loadLayout() {
      try {
        const resp = await fetch('/wall/layout');
        layout = await resp.json();
      } catch(e) {
        layout = {};
      }
      renderLayout();
    }

    function renderLayout() {
      clockIntervals.forEach(clearInterval);
      countdownIntervals.forEach(clearInterval);
      calendarTimers.forEach(clearInterval);
      listTimers.forEach(clearInterval);
      listTimers = [];
      clockIntervals = [];
      countdownIntervals = [];
      calendarTimers = [];

      document.querySelectorAll('.widget[data-id]').forEach(function(el) {
        if (el.dataset.timerIv) clearInterval(parseInt(el.dataset.timerIv));
      });

      const canvas = document.getElementById('wallCanvas');
      canvas.innerHTML = '';

      applyBackground(layout.background);

      const widgets = layout.widgets || [];
      widgets.forEach(w => {
        const el = createWidgetEl(w);
        canvas.appendChild(el);
      });
    }

    function applyBackground(bg) {
      if (!bg) return;
      if (bg.type === 'color') {
        document.body.style.background = bg.value;
        document.body.style.backgroundImage = '';
      } else if (bg.type === 'image') {
        document.body.style.background = '#000';
        document.body.style.backgroundImage = "url('" + bg.value + "')";
        document.body.style.backgroundSize = 'cover';
        document.body.style.backgroundPosition = 'center';
      }
    }

    function loadGoogleFont(family) {
      if (!family || family === 'Bebas Neue' || family === 'IBM Plex Mono' || family === 'Inter') return;
      var id = 'gf-' + family.replace(/[^a-zA-Z0-9]/g, '-');
      if (document.getElementById(id)) return;
      var link = document.createElement('link');
      link.id = id;
      link.rel = 'stylesheet';
      link.href = 'https://fonts.googleapis.com/css2?family=' + encodeURIComponent(family) + ':wght@300;400;600;700&display=swap';
      document.head.appendChild(link);
    }

    function createWidgetEl(w) {
      const el = document.createElement('div');
      el.className = 'widget widget-' + w.type;
      el.style.left = w.x + 'px';
      el.style.top = w.y + 'px';
      el.style.width = w.width + 'px';
      el.style.height = w.height + 'px';
      el.dataset.id = w.id;

      switch(w.type) {
        case 'clock':    initClockWidget(el, w); break;
        case 'text':     initTextWidget(el, w); break;
        case 'countdown': initCountdownWidget(el, w); break;
        case 'image':    initImageWidget(el, w); break;
        case 'calendar': initCalendarWidget(el, w); break;
        case 'timer': initTimerWidget(el, w); break;
        case 'list': initListWidget(el, w); break;
      }
      return el;
    }

    function initClockWidget(el, w) {
      const cfg = w.config || {};
      const fontSize = cfg.fontSize || 80;
      const color = cfg.color || '#ffffff';
      const fontFamily = cfg.fontFamily || 'Bebas Neue';
      loadGoogleFont(fontFamily);
      const use24h = cfg.format === '24h';
      const timezone = cfg.timezone || Intl.DateTimeFormat().resolvedOptions().timeZone;
      const showDate = cfg.showDate !== false;
      const showSeconds = cfg.showSeconds !== false;

      el.style.flexDirection = 'column';
      const timeEl = document.createElement('div');
      timeEl.className = 'clockTime';
      timeEl.style.cssText = 'font-size:' + fontSize + 'px;color:' + color + ";font-family:'" + fontFamily + "',sans-serif;line-height:1;letter-spacing:2px;";

      const dateEl = document.createElement('div');
      dateEl.className = 'clockDate';
      dateEl.style.cssText = 'font-size:' + Math.round(fontSize * 0.3) + 'px;color:' + color + ";opacity:0.7;font-family:'IBM Plex Mono',monospace;margin-top:4px;";

      el.appendChild(timeEl);
      if (showDate) el.appendChild(dateEl);

      function tick() {
        const now = new Date();
        const opts = { hour: '2-digit', minute: '2-digit', ...(showSeconds ? {second: '2-digit'} : {}), hour12: !use24h, timeZone: timezone };
        timeEl.textContent = now.toLocaleTimeString('en-US', opts);
        if (showDate) {
          const dOpts = { weekday: 'long', month: 'long', day: 'numeric', timeZone: timezone };
          dateEl.textContent = now.toLocaleDateString('en-US', dOpts);
        }
      }
      tick();
      clockIntervals.push(setInterval(tick, 1000));
    }

    function initTextWidget(el, w) {
      const cfg = w.config || {};
      loadGoogleFont(cfg.fontFamily || 'Inter');
      const justify = cfg.textAlign === 'right' ? 'flex-end' : cfg.textAlign === 'center' ? 'center' : 'flex-start';
      el.style.cssText += 'font-size:' + (cfg.fontSize || 32) + 'px;color:' + (cfg.color || '#ffffff') + ";font-family:'" + (cfg.fontFamily || 'Inter') + "',sans-serif;font-weight:" + (cfg.bold ? '700' : '400') + ";font-style:" + (cfg.italic ? 'italic' : 'normal') + ";justify-content:" + justify + ";padding:12px;white-space:pre-wrap;word-break:break-word;";
      el.textContent = cfg.text || '';
    }

    function initCountdownWidget(el, w) {
      var cfg = w.config || {};
      var display = cfg.display || 'text';

      if (display === 'pie') {
        // Pie display — progress based on targetDate + configuredAt
        el.style.flexDirection = 'column';
        el.style.alignItems = 'center';
        el.style.justifyContent = 'center';
        el.style.gap = '8px';
        if (cfg.label) {
          var lbl = document.createElement('div');
          lbl.style.cssText = 'font-size:'+Math.round(w.height*0.05)+'px;color:'+(cfg.textColor||'#ffffff')+';opacity:0.7;font-family:"IBM Plex Mono",monospace;text-transform:uppercase;letter-spacing:2px;text-align:center;';
          lbl.textContent = cfg.label;
          el.appendChild(lbl);
        }
        var pad = cfg.label ? 0.1 : 0.05;
        var size = Math.round(Math.min(w.width, w.height)*(1-pad*2));
        var canvas = document.createElement('canvas');
        canvas.width = size; canvas.height = size;
        canvas.style.width = size+'px'; canvas.style.height = size+'px';
        el.appendChild(canvas);
        var ctx = canvas.getContext('2d');
        var targetMs = cfg.targetDate ? new Date(cfg.targetDate).getTime() : 0;
        var configuredAt = cfg.configuredAt ? parseInt(cfg.configuredAt) : (targetMs ? Date.now() : 0);
        var totalMs = targetMs && configuredAt ? Math.max(1, targetMs - configuredAt) : 1;
        function drawCd() {
          var now = Date.now();
          var remaining = targetMs ? Math.max(0, targetMs - now) : 0;
          var progress = targetMs ? Math.max(0, Math.min(1, 1 - remaining/totalMs)) : 0;
          drawPieCanvas(ctx, size, progress, remaining, cfg);
        }
        drawCd();
        el.dataset.cdIv = setInterval(drawCd, 1000);

      } else {
        // Text display (original behavior)
        var fontSize = cfg.fontSize || 60;
        var color = cfg.color || '#ffffff';
        var accentColor = cfg.accentColor || 'var(--color1, #ff6b6b)';
        var fontFamily = cfg.fontFamily || 'Bebas Neue';
        loadGoogleFont(fontFamily);
        var targetDate = cfg.targetDate ? new Date(cfg.targetDate) : null;
        var label = cfg.label || 'Countdown';
        var showSeconds = cfg.showSeconds !== false;
        el.innerHTML =
          '<div class="cdLabel" style="font-size:'+Math.round(fontSize*0.35)+'px;color:'+accentColor+';font-family:\'IBM Plex Mono\',monospace;text-transform:uppercase;letter-spacing:3px;margin-bottom:8px;">'+label+'</div>'+
          '<div class="cdTime" style="font-size:'+fontSize+'px;color:'+color+';font-family:\''+fontFamily+'\',sans-serif;letter-spacing:4px;\"></div>'+
          '<div class="cdSub" style="font-size:'+Math.round(fontSize*0.25)+'px;color:'+color+';opacity:0.6;font-family:\'IBM Plex Mono\',monospace;margin-top:4px;\"></div>';
        var timeEl = el.querySelector('.cdTime');
        var subEl = el.querySelector('.cdSub');
        function tickCd() {
          if (!targetDate) { timeEl.textContent = '--'; return; }
          var diff = targetDate - new Date();
          if (diff <= 0) { timeEl.textContent = '0d 0h 0m'; subEl.textContent = 'Arrived!'; return; }
          var days = Math.floor(diff/86400000);
          var hours = Math.floor((diff%86400000)/3600000);
          var mins = Math.floor((diff%3600000)/60000);
          var secs = Math.floor((diff%60000)/1000);
          if (days > 0) {
            timeEl.textContent = showSeconds ? days+'d '+hours+'h '+mins+'m '+secs+'s' : days+'d '+hours+'h '+mins+'m';
            subEl.textContent = targetDate.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
          } else {
            timeEl.textContent = showSeconds ? hours+':'+String(mins).padStart(2,'0')+':'+String(secs).padStart(2,'0') : hours+'h '+mins+'m';
            subEl.textContent = 'Today!';
          }
        }
        tickCd();
        el.dataset.cdIv = setInterval(tickCd, 1000);
      }
      // future display types: 'arc', 'bar', etc.
    }

    function initImageWidget(el, w) {
      const cfg = w.config || {};
      const img = document.createElement('img');
      img.src = cfg.src || '';
      img.style.cssText = 'max-width:100%;max-height:100%;object-fit:' + (cfg.objectFit || 'contain') + ';';
      el.style.background = 'transparent';
      el.appendChild(img);
    }

    function initCalendarWidget(el, w) {
  var cfg = w.config || {};
  var fontSize = parseFloat(cfg.fontSize) || 18;
  var textColor = cfg.textColor || '#ffffff';
  var accentColor = cfg.accentColor || '#6bceff';
  var fontFamily = cfg.fontFamily || 'Inter';
  loadGoogleFont(fontFamily);
  var icsUrl = cfg.icsUrl || '';
  var view = cfg.view || 'next-days';
  var weekStartsOn = cfg.weekStartsOn === 'mon' ? 1 : 0;  // 0=Sun,1=Mon
  var eventCount = parseInt(cfg.eventCount) || 3;
  var wrapText = cfg.wrapText === true;
  var noWrap = wrapText
    ? 'overflow:hidden;word-break:break-word;white-space:normal;'
    : 'overflow:hidden;text-overflow:ellipsis;white-space:nowrap;';

  el.style.cssText += 'padding:12px;overflow:hidden;box-sizing:border-box;';

  // Optional title header
  if (cfg.title) {
    var hdr = document.createElement('div');
    hdr.style.cssText = 'font-size:' + Math.round(fontSize * 0.75) + 'px;color:' + accentColor + ";font-family:'IBM Plex Mono',monospace;text-transform:uppercase;letter-spacing:3px;margin-bottom:10px;flex-shrink:0;";
    hdr.textContent = cfg.title;
    el.appendChild(hdr);
  }

  // Content container (fills remaining space)
  var body = document.createElement('div');
  body.style.cssText = 'flex:1;overflow:hidden;min-height:0;display:flex;flex-direction:column;';
  el.appendChild(body);

  // ---- Helpers ----

  function isoToLocal(isoStr) {
    if (isoStr && /^\d{4}-\d{2}-\d{2}$/.test(isoStr)) {
      var p = isoStr.split('-');
      return new Date(+p[0], +p[1]-1, +p[2]);
    }
    return new Date(isoStr);
  }

  function startOfDay(d) {
    var r = new Date(d);
    r.setHours(0, 0, 0, 0);
    return r;
  }

  function dayKey(d) {
    // 'YYYY-MM-DD' in local time
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  }

  function sameDay(a, b) { return dayKey(a) === dayKey(b); }

  function fmtTime(d) {
    return d.toLocaleTimeString('en-US', {hour:'numeric', minute:'2-digit', hour12:true});
  }

  function fmtDate(d, opts) {
    return d.toLocaleDateString('en-US', opts);
  }

  var DAY_SHORT = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  var DAY_LONG  = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  var MON_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  function eventsForDay(events, d) {
    var k = dayKey(d);
    return events.filter(function(ev) {
      return dayKey(isoToLocal(ev.start)) === k;
    });
  }

  function groupByDay(events, fromDate, toDate) {
    // Returns array of {date, events[]} for each day in [fromDate, toDate]
    var days = [];
    var cur = startOfDay(fromDate);
    var end = startOfDay(toDate);
    while (cur <= end) {
      var evs = eventsForDay(events, cur);
      if (evs.length) days.push({date: new Date(cur), events: evs});
      cur = new Date(cur.getTime() + 86400000);
    }
    return days;
  }

  // ---- View renderers ----

  function renderError(msg) {
    body.innerHTML = '';
    var d = document.createElement('div');
    d.style.cssText = 'font-size:' + fontSize + 'px;color:' + textColor + ';opacity:0.4;padding:8px;';
    d.textContent = msg;
    body.appendChild(d);
  }

  function renderAgenda(events) {
    body.innerHTML = '';
    var today = new Date();
    var todayEvs = eventsForDay(events, today);
    var allDayEvs = todayEvs.filter(function(e){ return e.allDay; });
    var timedEvs  = todayEvs.filter(function(e){ return !e.allDay; });

    // Date header
    var dateHdr = document.createElement('div');
    dateHdr.style.cssText = 'font-size:' + Math.round(fontSize*1.1) + 'px;color:' + accentColor + ";font-family:'IBM Plex Mono',monospace;margin-bottom:10px;flex-shrink:0;";
    dateHdr.textContent = fmtDate(today, {weekday:'long', month:'long', day:'numeric'});
    body.appendChild(dateHdr);

    if (!todayEvs.length) {
      var empty = document.createElement('div');
      empty.style.cssText = 'font-size:' + fontSize + 'px;color:' + textColor + ';opacity:0.35;';
      empty.textContent = 'Nothing today';
      body.appendChild(empty);
      return;
    }

    // All-day events
    allDayEvs.forEach(function(ev) {
      var row = document.createElement('div');
      row.style.cssText = 'display:flex;gap:10px;align-items:baseline;margin-bottom:6px;';
      var t = document.createElement('div');
      t.style.cssText = 'font-size:' + Math.round(fontSize*0.75) + 'px;color:' + accentColor + ";font-family:'IBM Plex Mono',monospace;flex-shrink:0;min-width:70px;";
      t.textContent = 'All Day';
      var n = document.createElement('div');
n.style.cssText = 'font-size:' + fontSize + 'px;color:' + textColor + ";font-family:'"+fontFamily+"',sans-serif;" + noWrap;
        n.textContent = ev.summary;
        row.appendChild(t); row.appendChild(n);
        body.appendChild(row);
      });

     // Timed events
     timedEvs.forEach(function(ev) {
       var row = document.createElement('div');
       row.style.cssText = 'display:flex;gap:10px;align-items:baseline;margin-bottom:6px;';
       var t = document.createElement('div');
       t.style.cssText = 'font-size:' + Math.round(fontSize*0.75) + 'px;color:' + accentColor + ";font-family:'IBM Plex Mono',monospace;flex-shrink:0;min-width:70px;";
       t.textContent = fmtTime(isoToLocal(ev.start));
       var n = document.createElement('div');
       n.style.cssText = 'font-size:' + fontSize + 'px;color:' + textColor + ";font-family:'"+fontFamily+"',sans-serif;" + noWrap;
       n.textContent = ev.summary;
      row.appendChild(t); row.appendChild(n);
      body.appendChild(row);
    });
  }

  function renderListDays(events, fromDate, toDate, label) {
    body.innerHTML = '';
    var groups = groupByDay(events, fromDate, toDate);
    if (!groups.length) { renderError('No events'); return; }

    var scroll = document.createElement('div');
    scroll.style.cssText = 'overflow:hidden;flex:1;display:flex;flex-direction:column;gap:14px;';
    body.appendChild(scroll);

    groups.forEach(function(g) {
      var section = document.createElement('div');
      var today = new Date();

      var dayHdr = document.createElement('div');
      dayHdr.style.cssText = 'font-size:' + Math.round(fontSize*0.8) + 'px;color:' + accentColor + ";font-family:'IBM Plex Mono',monospace;text-transform:uppercase;letter-spacing:2px;margin-bottom:4px;border-bottom:1px solid " + accentColor + '33;padding-bottom:4px;';
      var isToday = sameDay(g.date, today);
      dayHdr.textContent = isToday
        ? 'Today — ' + fmtDate(g.date, {month:'short', day:'numeric'})
        : DAY_LONG[g.date.getDay()] + ', ' + fmtDate(g.date, {month:'short', day:'numeric'});
      section.appendChild(dayHdr);

      g.events.forEach(function(ev) {
        var row = document.createElement('div');
        row.style.cssText = 'display:flex;gap:10px;align-items:baseline;padding:2px 0;';
        var t = document.createElement('div');
        t.style.cssText = 'font-size:' + Math.round(fontSize*0.75) + 'px;color:' + accentColor + ";font-family:'IBM Plex Mono',monospace;flex-shrink:0;min-width:70px;";
        t.textContent = ev.allDay ? 'All Day' : fmtTime(isoToLocal(ev.start));
        var n = document.createElement('div');
        n.style.cssText = 'font-size:' + fontSize + 'px;color:' + textColor + ";font-family:'"+fontFamily+"',sans-serif;" + noWrap;
        n.textContent = ev.summary;
        row.appendChild(t); row.appendChild(n);
        section.appendChild(row);
      });

      scroll.appendChild(section);
    });
  }

  function renderWeek(events) {
    body.innerHTML = '';
    var today = new Date();
    // Compute week start
    var dow = today.getDay(); // 0=Sun
    var diff = (dow - weekStartsOn + 7) % 7;
    var weekStart = startOfDay(new Date(today.getTime() - diff * 86400000));

    // Column headers row
    var headerRow = document.createElement('div');
    headerRow.style.cssText = 'display:flex;gap:4px;margin-bottom:6px;flex-shrink:0;';
    body.appendChild(headerRow);

    // Columns container
    var colRow = document.createElement('div');
    colRow.style.cssText = 'display:flex;gap:4px;flex:1;overflow:hidden;';
    body.appendChild(colRow);

    for (var i = 0; i < 7; i++) {
      var colDate = new Date(weekStart.getTime() + i * 86400000);
      var isToday = sameDay(colDate, today);

      // Header cell
      var hc = document.createElement('div');
      hc.style.cssText = 'flex:1;text-align:center;font-size:' + Math.round(fontSize*0.75) + 'px;font-family:\'IBM Plex Mono\',monospace;padding:4px 2px;border-radius:4px 4px 0 0;background:' + (isToday ? accentColor+'33' : 'rgba(255,255,255,0.05)') + ';color:' + (isToday ? accentColor : textColor) + ';';
      hc.innerHTML = DAY_SHORT[colDate.getDay()] + '<br><span style="font-size:' + Math.round(fontSize*1.1) + 'px;font-weight:600;">' + colDate.getDate() + '</span>';
      headerRow.appendChild(hc);

      // Event column
      var col = document.createElement('div');
      col.style.cssText = 'flex:1;overflow:hidden;display:flex;flex-direction:column;gap:3px;padding:4px 2px;background:' + (isToday ? accentColor+'18' : 'transparent') + ';border-radius:0 0 4px 4px;';

      var dayEvs = eventsForDay(events, colDate);
      dayEvs.forEach(function(ev) {
        var chip = document.createElement('div');
        chip.style.cssText = 'font-size:' + Math.round(fontSize*0.7) + 'px;color:' + textColor + ";font-family:'"+fontFamily+"',sans-serif;background:rgba(255,255,255,0.1);border-radius:3px;padding:2px 4px;" + noWrap + 'border-left:2px solid ' + accentColor + ';';
        chip.title = ev.summary;
        chip.textContent = ev.allDay ? ev.summary : fmtTime(isoToLocal(ev.start)) + ' ' + ev.summary;
        col.appendChild(chip);
      });

      colRow.appendChild(col);
    }
  }

  function renderMonth(events) {
    body.innerHTML = '';
    var today = new Date();
    var year = today.getFullYear();
    var month = today.getMonth();

    // Month + year header
    var mhdr = document.createElement('div');
    mhdr.style.cssText = 'font-size:' + Math.round(fontSize*0.9) + 'px;color:' + accentColor + ";font-family:'IBM Plex Mono',monospace;text-transform:uppercase;letter-spacing:2px;margin-bottom:8px;flex-shrink:0;";
    mhdr.textContent = MON_SHORT[month] + ' ' + year;
    body.appendChild(mhdr);

    // Day-of-week header row
    var dowRow = document.createElement('div');
    dowRow.style.cssText = 'display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:2px;flex-shrink:0;';
    for (var i = 0; i < 7; i++) {
      var d = (i + weekStartsOn) % 7;
      var dh = document.createElement('div');
      dh.style.cssText = 'text-align:center;font-size:' + Math.round(fontSize*0.65) + 'px;color:' + textColor + ";opacity:0.5;font-family:'IBM Plex Mono',monospace;";
      dh.textContent = DAY_SHORT[d];
      dowRow.appendChild(dh);
    }
    body.appendChild(dowRow);

    // Grid
    var grid = document.createElement('div');
    grid.style.cssText = 'display:grid;grid-template-columns:repeat(7,1fr);gap:2px;flex:1;overflow:hidden;';
    body.appendChild(grid);

    // First day of month
    var firstDay = new Date(year, month, 1);
    var startDow = firstDay.getDay();
    var startOffset = (startDow - weekStartsOn + 7) % 7;

    // Total cells: 6 rows × 7
    var totalCells = 42;
    for (var ci = 0; ci < totalCells; ci++) {
      var cellDate = new Date(year, month, 1 - startOffset + ci);
      var inMonth = cellDate.getMonth() === month && cellDate.getFullYear() === year;
      var isTodayCell = sameDay(cellDate, today);

      var cell = document.createElement('div');
      cell.style.cssText = 'display:flex;flex-direction:column;overflow:hidden;padding:2px 3px;border-radius:3px;background:' +
        (isTodayCell ? accentColor + '22' : inMonth ? 'rgba(255,255,255,0.04)' : 'transparent') + ';';

      var dayNum = document.createElement('div');
      dayNum.style.cssText = 'font-size:' + Math.round(fontSize*0.75) + 'px;font-family:\'IBM Plex Mono\',monospace;color:' +
        (isTodayCell ? accentColor : inMonth ? textColor : textColor + '55') +
        (isTodayCell ? ';font-weight:700;' : ';opacity:' + (inMonth ? '0.9' : '0.3') + ';');
      dayNum.textContent = cellDate.getDate();
      cell.appendChild(dayNum);

      if (inMonth || !inMonth) {  // show events for all visible days
        var cellEvs = eventsForDay(events, cellDate);
        var shown = 0;
        cellEvs.forEach(function(ev) {
          if (shown >= eventCount) return;
          var evEl = document.createElement('div');
          evEl.style.cssText = 'font-size:' + Math.round(fontSize*0.58) + 'px;color:' + textColor + ";font-family:'"+fontFamily+"',sans-serif;background:" + accentColor + '33;border-radius:2px;padding:1px 3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:1px;';
          evEl.title = ev.summary;
          evEl.textContent = ev.summary;
          cell.appendChild(evEl);
          shown++;
        });
        if (cellEvs.length > eventCount) {
          var more = document.createElement('div');
          more.style.cssText = 'font-size:' + Math.round(fontSize*0.55) + 'px;color:' + accentColor + ';opacity:0.7;margin-top:1px;';
          more.textContent = '+' + (cellEvs.length - eventCount) + ' more';
          cell.appendChild(more);
        }
      }

      grid.appendChild(cell);
    }
  }

  // ---- Main refresh ----

  function renderMonthName() {
    body.innerHTML = '';
    var now = new Date();
    var wrap = document.createElement('div');
    wrap.style.cssText = 'flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;';
    var mn = document.createElement('div');
    mn.style.cssText = 'font-size:' + Math.round(w.height * 0.38) + 'px;color:' + textColor + ";font-family:'" + fontFamily + "',sans-serif;line-height:1;";
    mn.textContent = now.toLocaleDateString('en-US', {month:'long'});
    wrap.appendChild(mn);
    var yr = document.createElement('div');
    yr.style.cssText = 'font-size:' + Math.round(w.height * 0.1) + 'px;color:' + accentColor + ";font-family:'IBM Plex Mono',monospace;opacity:0.6;margin-top:10px;letter-spacing:4px;";
    yr.textContent = now.getFullYear();
    wrap.appendChild(yr);
    body.appendChild(wrap);
  }

  async function refresh() {
    if (view === 'month-name') { renderMonthName(); return; }
    if (!icsUrl) { body.innerHTML = ''; return; }
    var events;
    try {
      var resp = await fetch('/wall/ics?url=' + encodeURIComponent(icsUrl));
      events = await resp.json();
    } catch(e) {
      renderError('Calendar unavailable');
      return;
    }

    var now = new Date();
    if (view === 'agenda') {
      renderAgenda(events);
    } else if (view === 'next-days') {
      var days = parseInt(cfg.nextDays) || 7;
      var from = startOfDay(now);
      var to = new Date(from.getTime() + (days - 1) * 86400000);
      renderListDays(events, from, to);
    } else if (view === 'next-weeks') {
      var weeks = parseInt(cfg.nextWeeks) || 2;
      var from = startOfDay(now);
      var to = new Date(from.getTime() + weeks * 7 * 86400000 - 86400000);
      renderListDays(events, from, to);
    } else if (view === 'this-week') {
      renderWeek(events);
    } else if (view === 'this-month') {
      renderMonth(events);
    }
  }

  refresh();
  // In wall.html:  calendarTimers.push(setInterval(refresh, 900000));
  // In wall-edit.html: el.dataset.calIv = setInterval(refresh, 900000);
}

  function initTimerWidget(el, w) {
       var cfg = w.config || {};
       var display = cfg.display || 'pie';
       var durationMs = (parseFloat(cfg.durationMinutes)||60)*60000;
       var startedAt = cfg.startedAt ? parseInt(cfg.startedAt) : 0;

 if (display === 'text') {
          // Text display — mirrors countdown text style
          var fontSize = cfg.fontSize || 60;
          var color = cfg.textColor || '#ffffff';
          var accentColor = cfg.fillColor || 'var(--color1, #ff6b6b)';
          var fontFamily = cfg.fontFamily || 'Bebas Neue';
          loadGoogleFont(fontFamily);
          var label = cfg.label || '';
          var showSeconds = cfg.showTime !== false;
          el.innerHTML =
            (label ? '<div class="cdLabel" style="font-size:'+Math.round(fontSize*0.35)+'px;color:'+accentColor+';font-family:\'IBM Plex Mono\',monospace;text-transform:uppercase;letter-spacing:3px;margin-bottom:8px;">'+label+'</div>' : '')+
            '<div class="cdTime" style="font-size:'+fontSize+'px;color:'+color+';font-family:\''+fontFamily+'\',sans-serif;letter-spacing:4px;\"></div>'+
            '<div class="cdSub" style="font-size:'+Math.round(fontSize*0.25)+'px;color:'+color+';opacity:0.6;font-family:\'IBM Plex Mono\',monospace;margin-top:4px;\"></div>';
         var timeEl2 = el.querySelector('.cdTime');
         var subEl2 = el.querySelector('.cdSub');
         function tickTm() {
           var remaining = startedAt ? Math.max(0, (startedAt + durationMs) - Date.now()) : durationMs;
           if (remaining <= 0) { timeEl2.textContent = 'Done!'; subEl2.textContent = ''; return; }
           var hrs = Math.floor(remaining/3600000);
           var mins2 = Math.floor((remaining%3600000)/60000);
           var secs2 = Math.floor((remaining%60000)/1000);
           timeEl2.textContent = showSeconds
             ? (hrs>0 ? hrs+':'+String(mins2).padStart(2,'0')+':'+String(secs2).padStart(2,'0') : mins2+':'+String(secs2).padStart(2,'0'))
             : (hrs>0 ? hrs+'h '+mins2+'m' : mins2+'m');
           subEl2.textContent = startedAt ? 'Started '+new Date(startedAt).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}) : '';
         }
         tickTm();
         el.dataset.timerIv = setInterval(tickTm, 1000);

       } else {
         // Pie display (original behavior)
         el.style.flexDirection = 'column';
         el.style.alignItems = 'center';
         el.style.justifyContent = 'center';
         el.style.gap = '8px';
         if (cfg.label) {
           var lbl2 = document.createElement('div');
           lbl2.style.cssText = 'font-size:'+Math.round(w.height*0.05)+'px;color:'+(cfg.textColor||'#ffffff')+';opacity:0.7;font-family:"IBM Plex Mono",monospace;text-transform:uppercase;letter-spacing:2px;text-align:center;';
           lbl2.textContent = cfg.label;
           el.appendChild(lbl2);
         }
         var pad2 = cfg.label ? 0.1 : 0.05;
         var size2 = Math.round(Math.min(w.width,w.height)*(1-pad2*2));
         var canvas2 = document.createElement('canvas');
         canvas2.width = size2; canvas2.height = size2;
         canvas2.style.width = size2+'px'; canvas2.style.height = size2+'px';
         el.appendChild(canvas2);
         var ctx2 = canvas2.getContext('2d');
         function drawTm() {
           var now2 = Date.now();
           var remaining2 = startedAt ? Math.max(0,(startedAt+durationMs)-now2) : durationMs;
           var progress2 = startedAt && durationMs ? Math.max(0,Math.min(1,(now2-startedAt)/durationMs)) : 0;
           drawPieCanvas(ctx2, size2, progress2, remaining2, cfg);
         }
         drawTm();
         el.dataset.timerIv = setInterval(drawTm, 1000);
       }
       // future display types: 'arc', 'bar', etc.
     }

function initListWidget(el, w) {
   var cfg = w.config || {};
   var fontSize = parseFloat(cfg.fontSize) || 18;
   var textColor = cfg.textColor || '#ffffff';
   var accentColor = cfg.accentColor || '#6bceff';
   var fontFamily = cfg.fontFamily || 'Inter';
   loadGoogleFont(fontFamily);
  var source = cfg.source || 'todoist';
  var maxItems = parseInt(cfg.maxItems) || 20;
  var showCompleted = cfg.showCompleted === true;
  var wrapText = cfg.wrapText === true;
  var noWrap = wrapText
    ? 'overflow:hidden;word-break:break-word;white-space:normal;'
    : 'overflow:hidden;text-overflow:ellipsis;white-space:nowrap;';

  el.style.cssText += 'padding:12px;overflow:hidden;box-sizing:border-box;';

  if (cfg.title) {
    var hdr = document.createElement('div');
    hdr.style.cssText = 'font-size:' + Math.round(fontSize * 0.75) + 'px;color:' + accentColor + ";font-family:'IBM Plex Mono',monospace;text-transform:uppercase;letter-spacing:3px;margin-bottom:10px;flex-shrink:0;";
    hdr.textContent = cfg.title;
    el.appendChild(hdr);
  }

  var listEl = document.createElement('div');
  listEl.style.cssText = 'flex:1;overflow:hidden;display:flex;flex-direction:column;gap:4px;';
  el.appendChild(listEl);

  var PRIORITY_COLOR = {'4': accentColor, '3': '#ff9f43', '2': '#ff6b6b', '1': '#ff6b6b'};

  function fmtDue(dueStr) {
    if (!dueStr) return null;
    var d = new Date(dueStr);
    var today = new Date(); today.setHours(0,0,0,0);
    var diff = Math.floor((d - today) / 86400000);
    if (diff < 0) return {text: 'Overdue', overdue: true};
    if (diff === 0) return {text: 'Today', overdue: false};
    if (diff === 1) return {text: 'Tomorrow', overdue: false};
    return {text: d.toLocaleDateString('en-US', {month:'short', day:'numeric'}), overdue: false};
  }

  function renderItems(items) {
    listEl.innerHTML = '';
    if (!items.length) {
      var empty = document.createElement('div');
      empty.style.cssText = 'font-size:' + fontSize + 'px;color:' + textColor + ';opacity:0.35;';
      empty.textContent = 'No items';
      listEl.appendChild(empty);
      return;
    }
    items.forEach(function(item) {
      var completed = item.isCompleted || item.completed || false;
      if (completed && !showCompleted) return;

      var row = document.createElement('div');
      row.style.cssText = 'display:flex;align-items:baseline;gap:8px;padding:2px 0;';

      var check = document.createElement('div');
      check.style.cssText = 'flex-shrink:0;font-size:' + Math.round(fontSize * 0.85) + 'px;color:' +
        (completed ? textColor + '55' : (source === 'todoist' ? (PRIORITY_COLOR[String(item.priority)] || accentColor) : accentColor)) + ';';
      check.textContent = completed ? '\u2713' : '\u2610';
      row.appendChild(check);

      var right = document.createElement('div');
      right.style.cssText = 'flex:1;overflow:hidden;';

      var content = document.createElement('div');
      content.style.cssText = 'font-size:' + fontSize + 'px;color:' + (completed ? textColor + '55' : textColor) + ";font-family:'"+fontFamily+"',sans-serif;" + noWrap + (completed ? 'text-decoration:line-through;' : '');
      content.textContent = item.content;
      right.appendChild(content);

      var due = fmtDue(item.due);
      if (due) {
        var dueEl = document.createElement('div');
        dueEl.style.cssText = 'font-size:' + Math.round(fontSize * 0.65) + 'px;color:' + (due.overdue ? '#ff6b6b' : accentColor) + ";font-family:'IBM Plex Mono',monospace;opacity:0.8;";
        dueEl.textContent = due.text;
        right.appendChild(dueEl);
      }

      row.appendChild(right);
      listEl.appendChild(row);
    });
  }

  function renderError(msg) {
    listEl.innerHTML = '';
    var d = document.createElement('div');
    d.style.cssText = 'font-size:' + fontSize + 'px;color:' + textColor + ';opacity:0.35;';
    d.textContent = msg;
    listEl.appendChild(d);
  }

  async function refresh() {
    try {
      var url, resp, items;
      if (source === 'todoist') {
        var params = new URLSearchParams();
        if (cfg.todoistFilter) params.set('filter', cfg.todoistFilter);
        if (cfg.todoistProject) params.set('project', cfg.todoistProject);
        params.set('limit', String(maxItems));
        resp = await fetch('/wall/list/todoist?' + params.toString());
        items = await resp.json();
      } else {
        var params2 = new URLSearchParams();
        params2.set('file', cfg.obsidianFile || '');
        params2.set('filter', cfg.obsidianFilter || 'incomplete');
        params2.set('limit', String(maxItems));
        resp = await fetch('/wall/list/obsidian?' + params2.toString());
        items = await resp.json();
      }
      renderItems(items);
    } catch(e) {
      renderError('Failed to load');
    }
  }

  refresh();
  listTimers.push(setInterval(refresh, 300000));
}

  function connectSSE() {
      const es = new EventSource('/wall/events');
      es.addEventListener('layoutUpdated', function() { loadLayout(); });
      es.onerror = function() { setTimeout(connectSSE, 5000); };
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
