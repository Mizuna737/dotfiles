[settings]
camera = 2
dwell_ms = 200
format = "GREY"

[[poses]]
name = "FIST"
thumb = false
index = false
middle = false
ring = false
pinky = false

[[poses]]
name = "FIVE"
thumb = true
index = true
middle = true
ring = true
pinky = true

[[poses]]
name = "SIGN"
thumb = true
index = true
middle = false
ring = false
pinky = true

[[poses]]
name = "THUMBS_UP"
thumb = true
index = false
middle = false
ring = false
pinky = false

[[poses]]
name = "FOUR"
thumb = false
index = true
middle = true
ring = true
pinky = true

[[poses]]
name = "THREE"
thumb = true
index = true
middle = true
ring = false
pinky = false

[[poses]]
name = "TWO"
thumb = false
index = true
middle = true
ring = false
pinky = false

[[poses]]
name = "ONE"
thumb = false
index = true
middle = false
ring = false
pinky = false

[[poses]]
name = "L"
thumb = true
index = true
middle = false
ring = false
pinky = false

[[poses]]
name = "OK"
index = false
middle = true
ring = true
pinky = true

[[bindings]]
name = "tag_cycle"
trigger = { active_while = "THREE", hand = "left", metric = "pinch_distance", range = [0.15, 0.3], type = "continuous" }

[[bindings]]
name = "set_volume"
trigger = { active_while = "L", hand = "left", metric = "pinch_distance", range = [0, 0.6], type = "continuous" }

[[bindings]]
name = "stack_cycle"
trigger = { active_while = "THREE", hand = "right", metric = "pinch_distance", range = [0.15, 0.3], type = "continuous" }

[[bindings]]
name = "play_pause"
trigger = { hand = "left", step_dwell_ms = 5, steps = ["FIVE", "FOUR"], type = "sequence", window_ms = 1500 }

[[bindings]]
name = "browser_back"
trigger = { type = "swipe", direction = "left", min_displacement = 0.3, hand = "either" }

[[bindings]]
name = "browser_forward"
trigger = { type = "swipe", direction = "right", min_displacement = 0.3, hand = "either" }
