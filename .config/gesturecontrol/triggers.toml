[settings]
camera = 2
dwellMs = 50
format = "GREY"
fps = 30
gracePeriodMs = 200
spreadThreshold = 0.4
spread_threshold = 0.15

[presence]
checkHz = 2
enabled = true
idleSeconds = 30
motionThreshold = 5
pauseHandsWhenAbsent = true
poseCheckMode = "fallback"
poseDetection = true
poseMinConfidence = 0.3
useMotionDetection = false

[[poses]]
name = "FIST"
thumb = false
index = false
middle = false
ring = false
pinky = false

[[poses]]
name = "LLAP"
index = true
middle = true
ring = true
pinky = true
spreadIndexMiddle = "close"
spreadMiddleRing = "apart"
spreadRingPinky = "close"

[[poses]]
name = "OPEN_PALM"
thumb = true
index = true
middle = true
ring = true
pinky = true
spreadThumbIndex = "apart"
spreadIndexMiddle = "apart"
spreadMiddleRing = "apart"
spreadRingPinky = "apart"

[[poses]]
name = "FIVE"
thumb = true
index = true
middle = true
ring = true
pinky = true

[[poses]]
name = "SIGN"
thumb = true
index = true
middle = false
ring = false
pinky = true

[[poses]]
name = "THUMBS_UP"
thumb = true
index = false
middle = false
ring = false
pinky = false

[[poses]]
name = "FOUR"
thumb = false
index = true
middle = true
ring = true
pinky = true

[[poses]]
name = "THREE"
thumb = true
index = true
middle = true
ring = false
pinky = false
spreadIndexMiddle = "apart"

[[poses]]
name = "TWO"
thumb = false
index = true
middle = true
ring = false
pinky = false

[[poses]]
name = "ONE"
thumb = false
index = true
middle = false
ring = false
pinky = false

[[poses]]
name = "L"
thumb = true
index = true
middle = false
ring = false
pinky = false

[[poses]]
name = "OK"
index = false
middle = true
ring = true
pinky = true

[[poses]]
name = "Y"
thumb = true
index = false
middle = false
ring = false
pinky = true

[[bindings]]
name = "tag_cycle"
require = [{hand = "left", pose = "THREE"}]
trigger = { hand = "left", hysteresis = 0.1, metric = "pinchDistance", range = [0.1, 0.2], type = "continuous" }

[[bindings]]
name = "set_volume"
require = [{hand = "either", pose = "OK"}]
trigger = { type = "continuous", metric = "angle", range = [0, 1], hand = "left" }

[[bindings]]
name = "window_cycle"
require = [{hand = "either", pose = "SIGN"}]
trigger = { hand = "left", hysteresis = 0.1, metric = "pinchDistance", range = [0.1, 0.2], type = "continuous" }

[[bindings]]
name = "play_pause"
trigger = { hand = "left", stepDwellMs = 1000, steps = ["FIST", "FIVE"], type = "sequence", windowMs = 3000 }

[[bindings]]
name = "browser_back"
require = [{hand = "either", pose = "SIGN"}]
trigger = { direction = "left", hand = "either", minDisplacement = 0.1, type = "swipe" }

[[bindings]]
name = "browser_forward"
require = [{hand = "either", pose = "SIGN"}]
trigger = { direction = "right", hand = "either", minDisplacement = 0.1, type = "swipe" }

[[bindings]]
name = "toggleGestureControl"
require = [{hand = "right", pose = "OPEN_PALM"}]
trigger = { hand = "left", stepDwellMs = 80, steps = ["FOUR", "LLAP", "FOUR", "FIST"], type = "sequence", windowMs = 2500 }
